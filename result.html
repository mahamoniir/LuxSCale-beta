<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="icon" type="image/x-icon" href="assets/favicon.svg">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    :root {
      --fm-heading: "Anton", sans-serif;
      --fm-body: "IBM Plex Sans Arabic", sans-serif;
      --bg-dark: #111111;
      --white: #ffffff;
      --muted: #d8d8d8;
      --accent: #e51d2f;
      --glass: rgba(255, 255, 255, 0.1);
      --glass-strong: rgba(0, 0, 0, 0.35);
      --border: rgba(255, 255, 255, 0.2);
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: var(--fm-body);
      color: var(--white);
      background: var(--bg-dark);
      overflow-x: hidden;
    }

    #myVideo {
      position: fixed;
      inset: 0;
      min-width: 100%;
      min-height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: linear-gradient(180deg, rgba(17,17,17,0.92) 5%, rgba(17,17,17,0.68) 45%, rgba(17,17,17,0.85) 100%);
    }

    .page-shell {
      width: min(1120px, 92%);
      margin-inline: auto;
    }

    .topbar {
      padding: 20px 0;
      border-bottom: 1px solid rgba(255,255,255,0.22);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      margin-bottom: 28px;
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .logo { width: 160px; max-width: 48vw; }

    .content-wrap { padding-bottom: 40px; }

    .title-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .eyebrow {
      display: inline-block;
      padding: 6px 11px;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 999px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .page-title {
      margin: 0;
      color: var(--white);
      font-family: var(--fm-heading);
      font-size: clamp(1.8rem, 4vw, 3rem);
      letter-spacing: 0.02em;
      line-height: 1.03;

    .summary-card {

      border: 1px solid var(--border);

      color: var(--white);

    .summary-card .card-title {

      color: var(--white);
    }

    .card {
      background: var(--glass-strong);
      border: 1px solid var(--border);

      color: var(--white);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: none !important;
    }

    .viewer {
      width: 100%;
      height: 220px;
      overflow: hidden;
      position: relative;
      cursor: grab;
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      border-top-left-radius: 18px;
      border-top-right-radius: 18px;
    }

    .viewer img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    .card .card-body { padding-bottom: 1rem; }

    .card .card-title {

      font-family: var(--fm-heading);
      letter-spacing: 0.02em;
      font-size: 1.4rem;
    }

    .list-group.list-group-flush {

      overflow: hidden;

      border-color: rgba(255,255,255,0.12);

    .list-group-item strong { color: #ffffff; font-weight: 600; }

    .btn {

      background: rgba(255,255,255,0.08) !important;

      background: rgba(229,29,47,0.15) !important;
      border-color: rgba(229,29,47,0.9) !important;

    .btn-polar {
      background: rgba(229,29,47,0.18) !important;
      border-color: var(--accent) !important;
      color: #fff !important;
    }
    .btn-polar:hover {

    #pdfLoadingOverlay {

      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);

      align-items: center;

      flex-direction: column;

      color: #fff;

<script>
/* ================================================================
   CONFIG
================================================================ */
const API_ENDPOINTS = (() => {
  const fromCurrentPage = new URL("./api/get.php", window.location.href).toString();
  const sameOriginRoot  = new URL("/api/get.php", window.location.origin).toString();
  const projectRoot     = new URL("/LuxScaleAI/api/get.php", window.location.origin).toString();
  const endpoints = [fromCurrentPage, projectRoot, sameOriginRoot];
  const h = window.location.hostname;
  if (h === "localhost" || h === "127.0.0.1") {
    endpoints.push("http://127.0.0.1:5000/api/get");
    endpoints.push("http://localhost:5000/api/get");
    endpoints.push("http://localhost/sc-luxscaleai/api/get.php");
  }
  return [...new Set(endpoints)];
})();

const FLASK_BASE = (() => {
  const h = window.location.hostname;
  if (h === "localhost" || h === "127.0.0.1") return "http://127.0.0.1:5000";
  // return "";
  return "https://bkr3800.pythonanywhere.com";
})();

const FIXTURES_BASE = "https://shortcircuit.company/assets/img/products/";
const PLACEHOLDER   = FIXTURES_BASE + "placeholder.png";
const COMPANY_WHATSAPP_NUMBER = "201000948297";
const FIXTURE_MAP_ASSET = "assets/fixture_map_SC_IES_Fixed_v3.json";

let results = [];
let allResults = [];
let resultsDisplayed = 0;
let uiPaging = { initial: 3, batch: 3 };
let calculationMeta = {};
let fixtureMapDoc = undefined;
let request  = {};
let customer = {};

const RESULT_LINKS_KEY  = "luxscale_result_links";
const RESULT_LINK_TTL_MS = 60 * 60 * 1000;

/* ================================================================
   PDF HELPERS — route through Flask backend (generate_report.py)
   No pdf-lib / Unicode issues.
================================================================ */

function showPdfLoading(msg) {
  const overlay = document.getElementById("pdfLoadingOverlay");
  const text    = document.getElementById("pdfLoadingText");
  if (text) text.textContent = msg || "Generating PDF report…";
  if (overlay) overlay.classList.add("active");
}

function hidePdfLoading() {
  const overlay = document.getElementById("pdfLoadingOverlay");
  if (overlay) overlay.classList.remove("active");
}

/**
 * Download a PDF from the Flask backend and trigger browser save-dialog.
 * @param {string} url        - Flask endpoint URL
 * @param {string} filename   - suggested download filename
 */
async function downloadPdfFromFlask(url, filename) {
  showPdfLoading("Generating PDF report…");
  try {
    const res = await fetch(url, { method: "GET" });
    if (!res.ok) {
      let errMsg = `Server error ${res.status}`;
      try {
        const ct = res.headers.get("content-type") || "";
        if (ct.includes("application/json")) {
          const j = await res.json();
          errMsg = j.error || j.message || errMsg;
        } else {
          errMsg = (await res.text()).slice(0, 200) || errMsg;
        }
      } catch (_) {}
      throw new Error(errMsg);
    }
    const blob = await res.blob();
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    link.remove();
    URL.revokeObjectURL(link.href);
  } finally {
    hidePdfLoading();
  }
}

/**
 * Full-report PDF — all solutions.
 */
async function downloadFullReportPdf() {
  const token = getToken();
  if (!token) { alert("No token found."); return; }
  const url = `${FLASK_BASE}/api/report/${encodeURIComponent(token)}/full`;
  const filename = `SC_LuxScale_Report_${token.slice(0, 8)}.pdf`;
  try {
    await downloadPdfFromFlask(url, filename);
  } catch (err) {
    console.error("Full PDF error:", err);
    alert("Failed to generate full PDF report.\n" + err.message);
  }
}

/**
 * Single-solution PDF — one option.
 * @param {number} index - 0-based solution index
 * @param {HTMLElement} [btn] - the button that was clicked (for spinner state)
 */
async function downloadSolutionPdf(index, btn) {
  const token = getToken();
  if (!token) { alert("No token found."); return; }
  const url = `${FLASK_BASE}/api/report/${encodeURIComponent(token)}/solution/${index}`;
  const filename = `SC_LuxScale_Solution_${index + 1}_${token.slice(0, 8)}.pdf`;
  const origText = btn ? btn.textContent : "";
  if (btn) { btn.disabled = true; btn.textContent = "Generating…"; }
  try {
    await downloadPdfFromFlask(url, filename);
  } catch (err) {
    console.error("Solution PDF error:", err);
    alert(`Failed to generate PDF for Solution ${index + 1}.\n` + err.message);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = origText || "PDF"; }
  }
}

/* ================================================================
   TOKEN / LOCAL-STORAGE
================================================================ */
function getToken() {
  return new URLSearchParams(window.location.search).get("token");
}

function getStoredLinksRaw() {
  try {
    const raw = JSON.parse(localStorage.getItem(RESULT_LINKS_KEY) || "[]");
    return Array.isArray(raw) ? raw.filter(item => typeof item === "string" && item.length > 0) : [];
  } catch { return []; }
}

function getStoredAtFromLink(link) {
  try {
    const parsed = new URL(link, window.location.origin);
    const v = Number(parsed.searchParams.get("stored_at"));
    return Number.isFinite(v) ? v : 0;
  } catch { return 0; }
}

function getValidResultLinks() {
  const now = Date.now();
  const validLinks = getStoredLinksRaw()
    .filter(link => now - getStoredAtFromLink(link) <= RESULT_LINK_TTL_MS)
    .sort((a, b) => getStoredAtFromLink(b) - getStoredAtFromLink(a));
  localStorage.setItem(RESULT_LINKS_KEY, JSON.stringify(validLinks));
  return validLinks;
}

function saveCurrentResultLink() {
  const token = getToken();
  if (!token) return;
  const linkUrl = new URL("result.html", window.location.href);
  linkUrl.searchParams.set("token", token);
  linkUrl.searchParams.set("stored_at", String(Date.now()));
  const currentLink = linkUrl.pathname + linkUrl.search;
  const existing = getValidResultLinks().filter(item => item !== currentLink);
  existing.unshift(currentLink);
  localStorage.setItem(RESULT_LINKS_KEY, JSON.stringify(existing.slice(0, 20)));
}

/* ================================================================
   CSV
================================================================ */
function standardLightingCsvRows(requestObj) {
  if (!requestObj?.standard_lighting) return [];
  const sl = requestObj.standard_lighting;
  const L = typeof LuxStandardDisplay !== "undefined" ? LuxStandardDisplay : null;
  const aliases = L ? L.getAliases() : null;
  const lines = ["Section,Standard key,Label (aliases_upgraded),Value"];
  const entries = L ? L.standardEntriesInOrder(sl) : [];
  const esc = s => String(s).replace(/"/g, '""');
  if (entries.length) {
    entries.forEach(({ key, value }) => {
      if (value === undefined || value === null) return;
      const label = L ? L.labelForStandardField(key, aliases) : key;
      const val   = L ? L.valueToDisplayString(value) : String(value);
      lines.push(`Standard,${esc(key)},"${esc(label)}","${esc(val)}"`);
    });
  } else {
    Object.keys(sl).forEach(k => {
      const value = sl[k];
      if (value === undefined || value === null) return;
      lines.push(`Standard,${esc(k)},"${esc(k)}","${esc(String(value))}"`);
    });
  }
  return lines;
}

const BEAM_ANGLE_KEY = "Beam Angle (deg)";

function coerceBeamDeg(v) {
  if (v === undefined || v === null || v === "") return undefined;
  const n = typeof v === "number" ? v : Number(String(v).replace(",", "."));
  return Number.isFinite(n) ? n : undefined;
}

function beamAngleValueFromRow(r) {
  if (!r || typeof r !== "object") return undefined;
  const degKey = "Beam Angle (\u00B0)";
  const keys = [
    r.beam_angle_deg, r[BEAM_ANGLE_KEY], r["Beam angle (deg)"],
    r[degKey], r["Beam Angle (Â°)"], r.beam_angle, r["Beam Angle"],
  ];
  for (let i = 0; i < keys.length; i++) {
    const n = coerceBeamDeg(keys[i]);
    if (n !== undefined) return Math.abs(n);
  }
  return undefined;
}

const CALC_RESULT_KEY_ORDER = [
  "Luminaire","Power (W)","Efficacy (lm/W)","Fixtures",
  "Spacing X (m)","Spacing Y (m)","Average Lux","Uniformity",
  "U0_calculated","U1_calculated","E_min_grid_lx","E_avg_grid_lx","E_max_grid_lx",
  "Total Power (W/H)", BEAM_ANGLE_KEY, "Beam angle note","Compliance note"
];

const CALC_RESULT_LEGACY_KEYS = new Set([
  "luminaire","power","efficacy","fixtures","spacing_x","spacing_y",
  "avg_lux","uniformity","total_power","beam_angle"
]);

const CALC_FIELD_VERBOSE_LABEL = {
  _room_width_m:"Room width (m)", _room_length_m:"Room length (m)",
  _room_height_m:"Ceiling height (m)", _standard_ref:"Standard reference (ref. no.)",
  _standard_em_r_lx:"Standard Em,r (lx)", _standard_uo:"Standard Uo (ratio)",
  _standard_ra:"CRI (Ra)", _standard_rugl:"Standard RUGL / UGR",
  Luminaire:"Luminaire type", "Power (W)":"Luminaire power (W)",
  "Efficacy (lm/W)":"Luminous efficacy (lm/W)", Fixtures:"Number of fixtures",
  "Spacing X (m)":"Spacing along room width (m)",
  "Spacing Y (m)":"Spacing along room length (m)",
  "Average Lux":"Achieved average illuminance (lx)",
  Uniformity:"Standard Uo (required)", U0_calculated:"Calculated Uo (IES grid)",
  U1_calculated:"Calculated U1 (E_min/E_max)", E_min_grid_lx:"E_min on grid (lx)",
  E_avg_grid_lx:"E_avg on grid (lx)", E_max_grid_lx:"E_max on grid (lx)",
  "Total Power (W/H)":"Total installed power (W)",
  [BEAM_ANGLE_KEY]:"Beam angle (deg)",
  "Beam angle note":"Beam angle note (IES convention)",
  Selection:"How this option was chosen",
  "Compliance note":"Compliance note (best effort in this room)"
};

const CALC_OPTION_SECTIONS = [
  { title:"Room & study",       keys:["_room_width_m","_room_length_m","_room_height_m","_standard_ref","_standard_em_r_lx","_standard_uo","_standard_ra","_standard_rugl"] },
  { title:"Luminaire & layout", keys:["Luminaire","Power (W)","Fixtures","Spacing X (m)","Spacing Y (m)",BEAM_ANGLE_KEY] },
  { title:"Performance",        keys:["Efficacy (lm/W)","Average Lux","Uniformity","U0_calculated","U1_calculated","E_min_grid_lx","E_avg_grid_lx","E_max_grid_lx","Total Power (W/H)","Beam angle note"] },
  { title:"Record",             keys:["Selection","created_at","updated_at","id"] }
];

function normalizeCalcResultRow(r) {
  if (!r || typeof r !== "object") return r;
  const base = {
    "Luminaire":        r["Luminaire"]        ?? r.luminaire,
    "Power (W)":        r["Power (W)"]        ?? r.power,
    "Efficacy (lm/W)":  r["Efficacy (lm/W)"]  ?? r.efficacy,
    "Fixtures":         r["Fixtures"]         ?? r.fixtures,
    "Spacing X (m)":    r["Spacing X (m)"]    ?? r.spacing_x,
    "Spacing Y (m)":    r["Spacing Y (m)"]    ?? r.spacing_y,
    "Average Lux":      r["Average Lux"]      ?? r.avg_lux,
    "Uniformity":       r["Uniformity"]       ?? r.uniformity,
    "U0_calculated":    r["U0_calculated"]    ?? r.u0_calculated,
    "U1_calculated":    r["U1_calculated"]    ?? r.u1_calculated,
    "E_min_grid_lx":    r["E_min_grid_lx"]    ?? r.e_min_grid_lx,
    "E_avg_grid_lx":    r["E_avg_grid_lx"]    ?? r.e_avg_grid_lx,
    "E_max_grid_lx":    r["E_max_grid_lx"]    ?? r.e_max_grid_lx,
    "Total Power (W/H)":r["Total Power (W/H)"]?? r.total_power,
    [BEAM_ANGLE_KEY]:   beamAngleValueFromRow(r),
    "Beam angle note":  r["Beam angle note"]  ?? r.beam_angle_note,
    "Compliance note":  r["Compliance note"]  ?? r.compliance_note
  };
  const out = {};
  CALC_RESULT_KEY_ORDER.forEach(k => { const v = base[k]; if (v !== undefined && v !== null) out[k] = v; });
  ["created_at","updated_at","id"].forEach(k => { if (r[k] !== undefined && r[k] !== null) out[k] = r[k]; });
  if (r.Selection != null && String(r.Selection).trim() !== "") out.Selection = r.Selection;
  return out;
}

function enrichOptionCardRow(r, req) {
  const out = { ...r };
  const sides = req?.sides;
  if (Array.isArray(sides) && sides.length >= 2) { out._room_width_m = sides[0]; out._room_length_m = sides[1]; }
  if (req?.height !== undefined && req.height !== null && req.height !== "") out._room_height_m = req.height;
  const sl  = req?.standard_lighting;
  const ref = sl?.ref_no ?? req?.standard_ref_no;
  if (ref != null && String(ref).trim() !== "") out._standard_ref = String(ref).trim();
  if (sl && typeof sl === "object") {
    const setNum = (key, outKey) => { const v = sl[key]; if (v === undefined || v === null || v === "") return; out[outKey] = v; };
    setNum("Em_r_lx","_standard_em_r_lx"); setNum("Uo","_standard_uo");
    setNum("Ra","_standard_ra"); setNum("RUGL","_standard_rugl");
  }
  return out;
}

function csvHeadersForCalcResults(rows) {
  const extra = new Set();
  rows.forEach(r => { Object.keys(r).forEach(k => { if (CALC_RESULT_LEGACY_KEYS.has(k)) return; if (!CALC_RESULT_KEY_ORDER.includes(k) && !["created_at","updated_at","id"].includes(k)) extra.add(k); }); });
  const meta = ["created_at","updated_at","id"].filter(h => rows.some(r => r[h] !== undefined && r[h] !== null));
  return [...CALC_RESULT_KEY_ORDER, ...meta, ...Array.from(extra).sort()];
}

function generateCSV(data, requestObj) {
  if (!data || !data.length) return "";
  const out = [];
  const stdRows = standardLightingCsvRows(requestObj);
  if (stdRows.length) out.push(...stdRows, "");
  const headers = csvHeadersForCalcResults(data);
  out.push(headers.map(h => `"${String(h).replace(/"/g,'""')}"`).join(","));
  data.forEach(row => { out.push(headers.map(h => { const v = row[h]; if (v === undefined || v === null) return '""'; return `"${String(v).replace(/"/g,'""')}"`;}).join(",")); });
  return out.join("\n");
}

function downloadCSV(csv) {

================================================================ */
function normalizeLuminaireKey(s) { if (s == null || s === "") return ""; return String(s).trim().toLowerCase().replace(/\s+/g," "); }

async function ensureFixtureMapLoaded() {
  if (fixtureMapDoc !== undefined) return;
  try { const r = await fetch(new URL(FIXTURE_MAP_ASSET, window.location.href)); fixtureMapDoc = r.ok ? await r.json() : null; }
  catch { fixtureMapDoc = null; }
}

function imageUrlsFromFixtureMap(luminaire, power) {
  const doc = fixtureMapDoc;
  if (!doc?.entries?.length) return null;
  const key = normalizeLuminaireKey(luminaire);
  if (!key) return null;
  const candidates = doc.entries.filter(e => normalizeLuminaireKey(e.api_luminaire_name) === key);
  if (!candidates.length) return null;
  const pw = Number(power);
  let best = null, bestDist = Infinity;
  for (const e of candidates) {
    const ep = Number(e.power_w);
    if (!Number.isFinite(ep)) continue;
    if (Number.isFinite(pw) && ep === pw) { best = e; break; }
    const dist = Number.isFinite(pw) ? Math.abs(ep - pw) : ep;
    if (dist < bestDist) { bestDist = dist; best = e; }
  }
  if (!best && candidates.length) best = candidates.sort((a,b) => Number(a.power_w)-Number(b.power_w))[0];
  if (best?.image_urls?.length) return best.image_urls;
  return null;
}

function iesPathFromFixtureMap(luminaire, power) {
  const doc = fixtureMapDoc;
  if (!doc?.entries?.length) return null;
  const key = normalizeLuminaireKey(luminaire);
  if (!key) return null;
  const candidates = doc.entries.filter(e => normalizeLuminaireKey(e.api_luminaire_name) === key);
  if (!candidates.length) return null;
  const pw = Number(power);
  let best = null, bestDist = Infinity;
  for (const e of candidates) {
    const ep = Number(e.power_w);
    if (!Number.isFinite(ep)) continue;
    if (Number.isFinite(pw) && ep === pw) { best = e; break; }
    const dist = Number.isFinite(pw) ? Math.abs(ep - pw) : ep;
    if (dist < bestDist) { bestDist = dist; best = e; }
  }
  if (!best && candidates.length) best = candidates.sort((a,b) => Number(a.power_w)-Number(b.power_w))[0];
  return best?.relative_ies_path || null;
}

const NAME_TO_BASE = {
  "sc downlight":"SC-Spot","sc triproof":"SC-Triproof","sc backlight":"SC-Backlight",
  "sc flood":"SC-Flood","sc flood light exterior":"SC-Flood","sc highbay":"SC-HighBay",
  "sc street":"SC-Street","sc solar aio street":"SC-Solar-AIO-Street",
  "eco highbay":"ECO-HighBay","eco street":"ECO-Street","sv flood":"SV-Flood"
};

function extForBase(base) {
  const pngKeywords = ["Backlight","Triproof","Solar-AIO-Street","Spot"];
  for (const k of pngKeywords) if (base.includes(k)) return "png";
  return "webp";
}

function imageWattForUrl(luminaire, power) {
  const key = normalizeLuminaireKey(luminaire);
  const pw  = Number(power);
  if (key === "eco highbay"  && pw === 138) return 100;
  if (key === "sc highbay"   && pw === 138) return 100;
  if (key === "sc street"    && (pw === 50 || pw === 90)) return 100;
  if (key === "sc backlight" && (pw === 42 || pw === 32 || pw === 35)) return 36;
  if (key === "sc triproof"  && (pw === 30 || pw === 40)) return 36;
  return pw;
}

function buildFixtureImages(luminaire, power) {
  if (!luminaire) return [PLACEHOLDER];
  const fromMap = imageUrlsFromFixtureMap(luminaire, power);
  if (fromMap?.length) return fromMap;
  const key = normalizeLuminaireKey(luminaire);
  let base = NAME_TO_BASE[key];
  if (!base) { base = luminaire.trim().split(/\s+/).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join("-"); }
  const ext = extForBase(base);
  const images = [];
  if (key === "sc downlight" || base === "SC-Spot") {
    for (let i = 1; i <= 4; i++) images.push(FIXTURES_BASE + `${base}000${i}.${ext}`);
    return images;
  }
  const wNum = imageWattForUrl(luminaire, power);
  const watt = wNum != null && wNum !== "" && !Number.isNaN(wNum) ? `${wNum}W` : "";
  for (let i = 1; i <= 4; i++) {
    const filename = watt ? `${base}-${watt}-transparent000${i}.${ext}` : `${base}-transparent000${i}.${ext}`;
    images.push(FIXTURES_BASE + filename);
  }
  return images;
}

function setupViewer(viewerEl, imgEl, frames) {
  if (!viewerEl || !imgEl || !frames || !frames.length) return;
  let current = 0, startX = 0, isDown = false;
  frames.forEach(src => { const im = new Image(); im.src = src; });
  const setFrame = idx => { current = ((idx % frames.length) + frames.length) % frames.length; imgEl.src = frames[current]; };
  viewerEl.addEventListener("mousedown", e => { isDown = true; startX = e.pageX; viewerEl.style.cursor = "grabbing"; });
  window.addEventListener("mouseup", () => { isDown = false; viewerEl.style.cursor = "grab"; });
  viewerEl.addEventListener("mouseleave", () => { isDown = false; viewerEl.style.cursor = "grab"; });
  viewerEl.addEventListener("mousemove", e => { if (!isDown) return; const delta = e.pageX - startX; if (Math.abs(delta) >= 12) { setFrame(current + (delta > 0 ? -1 : 1)); startX = e.pageX; } });
  viewerEl.addEventListener("touchstart", e => { if (e.touches?.[0]) startX = e.touches[0].pageX; }, { passive:true });
  viewerEl.addEventListener("touchmove", e => { if (!e.touches?.[0]) return; const x = e.touches[0].pageX; const delta = x - startX; if (Math.abs(delta) >= 12) { setFrame(current + (delta > 0 ? -1 : 1)); startX = x; } }, { passive:true });
  viewerEl.addEventListener("click", () => setFrame(current + 1));
  imgEl.onerror = () => {
    const cur = imgEl.src;
    try { if (cur && !String(cur).includes("placeholder")) { const name = new URL(cur, window.location.href).pathname.split("/").pop(); if (name && !String(cur).includes("/assets/img/products/")) { imgEl.onerror = () => { imgEl.src = PLACEHOLDER; imgEl.onerror = null; }; imgEl.src = new URL("assets/img/products/" + name, window.location.href).href; return; } } } catch {}
    imgEl.src = PLACEHOLDER; imgEl.onerror = null;
  };
  setFrame(0);
}

function goToLayout(index) {

function normalizeResult(result) {
  return { luminaire: result["Luminaire"] ?? result.luminaire ?? "", power: Number(result["Power (W)"] ?? result.power ?? 0), fixtures: Math.max(1, Math.floor(Number(result["Fixtures"] ?? result.fixtures ?? 1))), spacingX: Math.max(0.01, Number(result["Spacing X (m)"] ?? result.spacing_x ?? 4) || 4), spacingY: Math.max(0.01, Number(result["Spacing Y (m)"] ?? result.spacing_y ?? 7) || 7) };
}

function buildModelData(result) {
  const normalized = normalizeResult(result);
  return { fixtures:normalized.fixtures, spacingX:normalized.spacingX, spacingY:normalized.spacingY, roomLength:Math.max(1,Number(request?.sides?.[0]??270)||270), roomWidth:Math.max(1,Number(request?.sides?.[1]??15)||15) };
}

function computeLayoutGrid(modelData) {
  const { fixtures, spacingX, spacingY, roomLength, roomWidth } = modelData;
  const maxCols = Math.floor(roomWidth / spacingX); const maxRows = Math.floor(roomLength / spacingY);
  let cols = maxCols > 0 ? maxCols : 1; let rows = maxRows > 0 ? maxRows : 1;
  if (cols * rows < fixtures) { rows = Math.ceil(fixtures / cols); if (maxRows > 0 && rows > maxRows) { rows = maxRows; cols = Math.ceil(fixtures / rows); if (maxCols > 0 && cols > maxCols) cols = maxCols; } }
  cols = Math.max(1, cols); rows = Math.max(1, rows);
  const gridWidth = (cols-1) * spacingX; const gridLength = (rows-1) * spacingY;
  const startX = -gridWidth / 2; const startZ = -gridLength / 2;
  const points = []; let placed = 0;
  for (let r = 0; r < rows && placed < fixtures; r++) for (let c = 0; c < cols && placed < fixtures; c++) { points.push({ x: startX + c*spacingX, z: startZ + r*spacingY }); placed++; }
  return { cols, rows, gridWidth, gridLength, points };
}

function downloadTextFile(filename, content, mimeType) {
  const blob = new Blob([content], { type:mimeType }); const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = filename; link.click(); URL.revokeObjectURL(link.href);
}

function dxfLine(x1,y1,x2,y2){ return `0\nLINE\n8\n0\n10\n${x1}\n20\n${y1}\n30\n0\n11\n${x2}\n21\n${y2}\n31\n0\n`; }
function dxfCircle(x,y,radius){ return `0\nCIRCLE\n8\n0\n10\n${x}\n20\n${y}\n30\n0\n40\n${radius}\n`; }

function buildDXFContent(modelData, layout) {
  const { roomLength, roomWidth } = modelData;
  const xMin=-roomWidth/2, xMax=roomWidth/2, zMin=-roomLength/2, zMax=roomLength/2;
  let entities = "";
  entities += dxfLine(xMin,zMin,xMax,zMin); entities += dxfLine(xMax,zMin,xMax,zMax); entities += dxfLine(xMax,zMax,xMin,zMax); entities += dxfLine(xMin,zMax,xMin,zMin);
  const op=0.25, oxMin=-layout.gridWidth/2-op, oxMax=layout.gridWidth/2+op, ozMin=-layout.gridLength/2-op, ozMax=layout.gridLength/2+op;
  entities += dxfLine(oxMin,ozMin,oxMax,ozMin); entities += dxfLine(oxMax,ozMin,oxMax,ozMax); entities += dxfLine(oxMax,ozMax,oxMin,ozMax); entities += dxfLine(oxMin,ozMax,oxMin,ozMin);
  layout.points.forEach(p => { entities += dxfCircle(p.x.toFixed(3),p.z.toFixed(3),0.08); });
  return `0\nSECTION\n2\nHEADER\n0\nENDSEC\n0\nSECTION\n2\nENTITIES\n${entities}0\nENDSEC\n0\nEOF\n`;
}

function stlFacet(ax,ay,az,bx,by,bz,cx,cy,cz){ return `  facet normal 0 0 0\n    outer loop\n      vertex ${ax} ${ay} ${az}\n      vertex ${bx} ${by} ${bz}\n      vertex ${cx} ${cy} ${cz}\n    endloop\n  endfacet\n`; }

function buildSTLContent(modelData, layout) {
  const { roomLength, roomWidth } = modelData;
  const wallHeight = Math.max(4, Math.min(30, Math.round(Math.max(6, roomWidth/1.2))));
  const mountY = wallHeight - 0.5;
  const xMin=-roomWidth/2, xMax=roomWidth/2, zMin=-roomLength/2, zMax=roomLength/2;
  const mhalf=0.08;
  const addQuad=(a,b,c,d)=>stlFacet(...a,...b,...c)+stlFacet(...a,...c,...d);
  let body = "";
  body += addQuad([xMin,0,zMin],[xMax,0,zMin],[xMax,0,zMax],[xMin,0,zMax]);
  body += addQuad([xMin,wallHeight,zMin],[xMax,wallHeight,zMin],[xMax,wallHeight,zMax],[xMin,wallHeight,zMax]);
  body += addQuad([xMin,0,zMin],[xMax,0,zMin],[xMax,wallHeight,zMin],[xMin,wallHeight,zMin]);
  body += addQuad([xMax,0,zMin],[xMax,0,zMax],[xMax,wallHeight,zMax],[xMax,wallHeight,zMin]);
  body += addQuad([xMax,0,zMax],[xMin,0,zMax],[xMin,wallHeight,zMax],[xMax,wallHeight,zMax]);
  body += addQuad([xMin,0,zMax],[xMin,0,zMin],[xMin,wallHeight,zMin],[xMin,wallHeight,zMax]);
  layout.points.forEach(p => {
    const {x,z}=p, ty=mountY+0.25;
    const p1=[x-mhalf,mountY,z-mhalf], p2=[x+mhalf,mountY,z-mhalf], p3=[x+mhalf,mountY,z+mhalf], p4=[x-mhalf,mountY,z+mhalf];
    body += stlFacet(...p1,...p2,x,ty,z); body += stlFacet(...p2,...p3,x,ty,z); body += stlFacet(...p3,...p4,x,ty,z); body += stlFacet(...p4,...p1,x,ty,z);
    body += stlFacet(...p1,...p2,...p3); body += stlFacet(...p1,...p3,...p4);
  });
  return `solid lighting_layout\n${body}endsolid lighting_layout\n`;
}

/* ================================================================
   STANDARD LIGHTING MERGE / FETCH
================================================================ */
let cachedStandardsCleanedRows = null;

async function loadStandardsCleanedRows() {
  if (cachedStandardsCleanedRows) return cachedStandardsCleanedRows;
  try { const res = await fetch("standards/standards_cleaned.json"); cachedStandardsCleanedRows = res.ok ? await res.json() : []; }
  catch { cachedStandardsCleanedRows = []; }
  return cachedStandardsCleanedRows;
}

function mergeStandardFieldIsMeaningful(v) { if (v === undefined || v === null) return false; if (typeof v === "string" && v.trim() === "") return false; return true; }

function mergeStandardLightingSources(data) {
  if (!data || typeof data !== "object") return {};
  const req = data.request || {};
  const sources = [data.standard_lighting, req.standard_lighting, data.standard_row].filter(s => s && typeof s === "object" && !Array.isArray(s));
  const out = {};
  sources.forEach(src => { Object.keys(src).forEach(k => { const v = src[k]; if (!mergeStandardFieldIsMeaningful(v)) return; out[k] = v; }); });
  const refFromReq = req.standard_ref_no ?? data.standard_ref_no;
  if ((out.ref_no === undefined || out.ref_no === null || String(out.ref_no).trim() === "") && refFromReq != null && String(refFromReq).trim() !== "") out.ref_no = String(refFromReq).trim();
  return out;
}

function mergeWithStashedStandard(token, requestObj) {
  if (!token || !requestObj) return;
  let stash = null;
  try { const raw = localStorage.getItem("luxscale_result_request_" + token); if (!raw) return; stash = JSON.parse(raw); } catch { return; }
  if (!stash || typeof stash !== "object") return;
  const stashSl = stash.standard_lighting;
  const hasStash = (stashSl && typeof stashSl === "object" && Object.keys(stashSl).length > 0) || (stash.standard_ref_no != null && String(stash.standard_ref_no).trim() !== "");
  if (!hasStash) return;
  const ref = stash.standard_ref_no;
  if (ref != null && String(ref).trim() !== "") { if (requestObj.standard_ref_no == null || String(requestObj.standard_ref_no).trim() === "") requestObj.standard_ref_no = String(ref).trim(); }
  const apiSl = requestObj.standard_lighting || {};
  const base  = stashSl && typeof stashSl === "object" ? { ...stashSl } : {};
  Object.keys(apiSl).forEach(k => { const v = apiSl[k]; if (v === undefined || v === null || !mergeStandardFieldIsMeaningful(v)) return; base[k] = v; });
  const sc = stash.standard_category, st2 = stash.standard_task_or_activity;
  if (mergeStandardFieldIsMeaningful(sc))  { requestObj.standard_category         = String(sc).trim();  if (!mergeStandardFieldIsMeaningful(base.category))      base.category      = requestObj.standard_category; }
  if (mergeStandardFieldIsMeaningful(st2)) { requestObj.standard_task_or_activity  = String(st2).trim(); if (!mergeStandardFieldIsMeaningful(base.task_or_activity)) base.task_or_activity = requestObj.standard_task_or_activity; }
  requestObj.standard_lighting = base;
}

function mergeWithStashedResults(token, resultRows) {
  if (!token || !Array.isArray(resultRows)) return resultRows;
  let stash = null;
  try { const raw = localStorage.getItem("luxscale_result_rows_" + token); if (!raw) return resultRows; stash = JSON.parse(raw); } catch { return resultRows; }
  if (!Array.isArray(stash) || stash.length === 0) return resultRows;
  return resultRows.map((row, idx) => {
    const st = stash[idx]; if (!st || typeof st !== "object") return row;
    const out = { ...st, ...row };
    const beamMerged = beamAngleValueFromRow(out); const beamStash = beamAngleValueFromRow(st);
    const recoverBeamFromStash = beamStash !== undefined && (beamMerged === undefined || (beamMerged === 120 && beamStash !== 120));
    if (recoverBeamFromStash) { if (st.beam_angle_deg != null) out.beam_angle_deg = st.beam_angle_deg; if (st["Beam Angle (deg)"] != null) out["Beam Angle (deg)"] = st["Beam Angle (deg)"]; if (st["Beam angle (deg)"] != null) out["Beam angle (deg)"] = st["Beam angle (deg)"]; const dk = "Beam Angle (\u00B0)"; if (st[dk] != null) out[dk] = st[dk]; }
    ["Beam angle note","Compliance note","IES lumens note"].forEach(k => { const v = out[k]; const missing = v === undefined || v === null || (typeof v === "string" && String(v).trim() === ""); if (missing && st[k] != null && String(st[k]).trim() !== "") out[k] = st[k]; });
    return out;
  });
}

async function mergeStandardLightingFromCleaned(requestObj) {
  if (!requestObj) return requestObj;
  const ref = requestObj.standard_lighting?.ref_no ?? requestObj.standard_ref_no;
  const refKey = ref != null && ref !== "" ? String(ref).trim() : "";
  if (!refKey) return requestObj;
  const rows = await loadStandardsCleanedRows();
  if (!Array.isArray(rows)) return requestObj;
  const row = rows.find(r => String(r.ref_no).trim() === refKey);
  if (!row) return requestObj;
  const existing = requestObj.standard_lighting || {};
  const merged   = { ...row };
  Object.keys(existing).forEach(k => { const v = existing[k]; if (v === undefined || v === null || !mergeStandardFieldIsMeaningful(v)) return; merged[k] = v; });
  requestObj.standard_lighting = merged;
  return requestObj;
}

async function mergeUiSettingsFromPublicApi() {
  try { const r = await fetch(new URL("assets/app_settings.json", window.location.href)); if (r.ok) { const j = await r.json(); const ui = j?.ui; if (ui && typeof ui === "object") { const ini = Number(ui.results_initial_count); const bat = Number(ui.results_batch_size); if (Number.isFinite(ini) && ini > 0) uiPaging.initial = ini; if (Number.isFinite(bat) && bat > 0) uiPaging.batch = bat; } return; } } catch {}
  const urls = [];
  for (const ep of API_ENDPOINTS) { try { const u = new URL(ep); if (u.hostname === "localhost" || u.hostname === "127.0.0.1") urls.push(`${u.protocol}//${u.hostname}:5000/api/ui-settings`); } catch {} }
  urls.push("http://127.0.0.1:5000/api/ui-settings","http://localhost:5000/api/ui-settings");
  for (const url of [...new Set(urls)]) { try { const r = await fetch(url, { credentials:"omit" }); if (!r.ok) continue; const j = await r.json(); if (!j || typeof j !== "object") continue; const ini = Number(j.results_initial_count); const bat = Number(j.results_batch_size); if (Number.isFinite(ini) && ini > 0) uiPaging.initial = ini; if (Number.isFinite(bat) && bat > 0) uiPaging.batch = bat; return; } catch {} }
}

function mergeCalculationMetaFromStash(token, apiMeta) {
  const api = apiMeta && typeof apiMeta === "object" ? { ...apiMeta } : {};
  if (!token) return api;
  let st = null;
  try { const raw = localStorage.getItem("luxscale_result_meta_" + token); if (raw) st = JSON.parse(raw); } catch { return api; }
  if (!st || typeof st !== "object") return api;
  const alen = Array.isArray(api.fixture_family_shortfall) ? api.fixture_family_shortfall.length : 0;
  const slen = Array.isArray(st.fixture_family_shortfall)  ? st.fixture_family_shortfall.length  : 0;
  const out  = { ...st, ...api };
  if (slen > alen) out.fixture_family_shortfall = st.fixture_family_shortfall;
  if (api.prioritized_weatherproof_triproof === undefined && st.prioritized_weatherproof_triproof !== undefined) out.prioritized_weatherproof_triproof = st.prioritized_weatherproof_triproof;
  return out;
}

/* ================================================================
   FETCH RESULTS
================================================================ */
async function fetchResultsPayload(token) {
  let lastError = "Failed to fetch results.";
  for (const endpoint of API_ENDPOINTS) {
    try {
      const response = await fetch(`${endpoint}?token=${encodeURIComponent(token)}`);
      const responseText = await response.text();
      let data = null;
      try { data = JSON.parse(responseText); } catch { throw new Error(`Invalid JSON from ${endpoint}`); }
      if (!response.ok) throw new Error(data?.message || `Request failed on ${endpoint}`);
      return data;
    } catch (error) { lastError = error.message || lastError; }
  }
  throw new Error(lastError);
}

async function loadResults() {
  const token = getToken();
  if (!token) { alert("No token provided."); return; }
  try {
    await Promise.all([
      typeof LuxStandardDisplay !== "undefined" ? LuxStandardDisplay.loadAliasesUpgraded() : Promise.resolve(),
      ensureFixtureMapLoaded(),
    ]);
    const data = await fetchResultsPayload(token);
    calculationMeta = mergeCalculationMetaFromStash(token, data.calculation_meta && typeof data.calculation_meta === "object" ? data.calculation_meta : {});
    uiPaging = { initial:3, batch:3 };
    if (data.ui_settings && typeof data.ui_settings === "object") {
      const ini = Number(data.ui_settings.results_initial_count); const bat = Number(data.ui_settings.results_batch_size);
      if (Number.isFinite(ini) && ini > 0) uiPaging.initial = ini; if (Number.isFinite(bat) && bat > 0) uiPaging.batch = bat;
    } else { await mergeUiSettingsFromPublicApi(); }
    results = data.results || data;
    request = data.request || { project_name: data.project_info?.["Project Name"], sides: [data.width, data.length], place: "" };
    const mergedSl = mergeStandardLightingSources(data);
    if (Object.keys(mergedSl).length > 0) request.standard_lighting = mergedSl;
    else if (!request.standard_lighting && data.standard_lighting) request.standard_lighting = data.standard_lighting;
    else if (!request.standard_lighting && data.standard_row) request.standard_lighting = data.standard_row;
    if (request.standard_ref_no == null && mergedSl.ref_no != null) request.standard_ref_no = mergedSl.ref_no;
    mergeWithStashedStandard(token, request);
    results = mergeWithStashedResults(token, results);
    await mergeStandardLightingFromCleaned(request);
    customer = data.customer || { name: data.project_info?.["Client Name"], phone: data.project_info?.["Client Number"], company: data.project_info?.["Company Name"], email: "" };
    results  = results.map(r => normalizeCalcResultRow(r));
    displayProjectSummary(request, customer);
    displayResults(results);
  } catch (err) { console.error("Fetch error:", err); alert("Failed to load results from API."); }
}

async function iesApiFetch(path, options = {}) {
  const url = FLASK_BASE + path;
  const res = await fetch(url, options);
  if (!res.ok) {
    const ct = res.headers.get("content-type") || "";
    if (!ct.includes("application/json")) throw new Error(`IES API unreachable at ${url} (HTTP ${res.status}). Is Flask running on port 5000?`);
  }
  return res;
}

async function openPolarCurve(index) {
  const r = results[index];
  if (!r) return;
  const luminaireName = r["Luminaire"] || r.luminaire || "";
  const powerW        = parseFloat(r["Power (W)"] ?? r.power ?? 0);
  const productLabel  = `${luminaireName}${powerW ? " \u2014 " + powerW + "W" : ""}`;
  await ensureFixtureMapLoaded();
  const iesRelPath = iesPathFromFixtureMap(luminaireName, powerW) || r["IES file"] || r.ies_file || "";
  const _room_w   = parseFloat(request?.sides?.[0] ?? request?.width  ?? 6) || 6;
  const _room_l   = parseFloat(request?.sides?.[1] ?? request?.length ?? 6) || 6;
  const _room_h   = parseFloat(request?.height ?? 3) || 3;
  const _sx       = parseFloat(r["Spacing X (m)"] ?? r.spacing_x ?? 0) || 0;
  const _sy       = parseFloat(r["Spacing Y (m)"] ?? r.spacing_y ?? 0) || 0;
  const _fixtures = Math.max(1, parseInt(r["Fixtures"] ?? r.fixtures ?? 1) || 1);
  let _nx = parseInt(r["layout_nx"]) || 0;
  let _ny = parseInt(r["layout_ny"]) || 0;
  if ((!_nx || !_ny) && r["Layout grid"]) { const parts = String(r["Layout grid"]).split(/[x\u00D7X]/); _nx = parseInt(parts[0]) || 0; _ny = parseInt(parts[1]) || 0; }
  if ((!_nx || !_ny) && _sx > 0 && _sy > 0 && _fixtures > 1) {
    const _maxCols = Math.max(1, Math.floor(_room_w / _sx)); const _maxRows = Math.max(1, Math.floor(_room_l / _sy));
    let _cols = Math.min(_maxCols, _fixtures); let _rows = Math.min(_maxRows, Math.ceil(_fixtures / _cols));
    if (_cols * _rows < _fixtures) { _rows = Math.ceil(_fixtures / _cols); if (_maxRows > 0 && _rows > _maxRows) { _rows = _maxRows; _cols = Math.ceil(_fixtures / _rows); } }
    _nx = Math.max(1, _cols); _ny = Math.max(1, _rows);
  }
  if (!_nx) _nx = 1; if (!_ny) _ny = 1;
  const placeData = { room_w:_room_w, room_l:_room_l, room_h:_room_h, layout_nx:_nx, layout_ny:_ny, spacing_x:_sx, spacing_y:_sy, fixtures:_fixtures };
  let sid = null;
  try {
    const fd = new FormData();
    fd.append("luminaire_name", luminaireName);
    fd.append("power_w", String(powerW));
    if (iesRelPath) fd.append("ies_filename", iesRelPath);
    const _designLm = parseFloat(r["Efficacy (lm/W)"] ?? r.efficacy ?? 0) * powerW;
    if (_designLm > 0) fd.append("design_lumens", String(_designLm));
    const res  = await iesApiFetch("/ies/upload", { method:"POST", body:fd });
    const data = await res.json();
    if (data.error) { alert("IES upload error: " + data.error); return; }
    sid = data.session_id;
  } catch (e) { alert("Could not reach Flask IES API.\n" + e.message); return; }
  const _efficacy     = parseFloat(r["Efficacy (lm/W)"] ?? r.efficacy ?? 0);
  const _designLumens = (_efficacy * powerW) || 0;
  const payload = { sid, placeData, productLabel, designLumens: _designLumens };
  try { sessionStorage.setItem("ies_open_payload", JSON.stringify(payload)); }
  catch { alert("sessionStorage unavailable \u2014 cannot open IES viewer."); return; }
  window.open("openies.html", "_blank");
}
