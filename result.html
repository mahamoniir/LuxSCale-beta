<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lighting Results</title>
  <link rel="icon" type="image/x-icon" href="assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">

      --fm-body: "IBM Plex Sans Arabic", sans-serif;

      --white: #ffffff;
      --muted: #d8d8d8;
      --accent: #e51d2f;

      color: var(--white);

    .topbar {
      padding: 20px 0;

      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);

    .topbar-inner {

    }

      max-width: 48vw;

    .title-row {

      margin-bottom: 18px;

    }

    .eyebrow {
      display: inline-block;

      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 999px;

    .viewer {

      overflow: hidden;
      position: relative;
      cursor: grab;
      background: rgba(255, 255, 255, 0.06);

    .card .card-title {

      color: var(--white);
      border-color: rgba(255, 255, 255, 0.12);

<script>
/* === CONFIG === */
const API_ENDPOINTS = (() => {
  const fromCurrentPage = new URL("./api/get.php", window.location.href).toString();
  const sameOriginRoot = new URL("/api/get.php", window.location.origin).toString();
  const projectRoot = new URL("/LuxSCaleAI/api/get.php", window.location.origin).toString();
  const endpoints = [fromCurrentPage, sameOriginRoot, projectRoot];

  // Keep localhost endpoint only for local development.
  if (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1") {
    endpoints.unshift("http://localhost/sc-luxscaleai/api/get.php");
  }

  return [...new Set(endpoints)];
})();
const FIXTURES_BASE = "https://shortcircuit.company/assets/img/products/";
const PLACEHOLDER = FIXTURES_BASE + "placeholder.png"; // provide a placeholder image
const COMPANY_WHATSAPP_NUMBER = "201000948297"; // wa.me format: country code + number, no + or spaces
/* ============ */

let results = [];
let request = {};
let customer = {};
const RESULT_LINKS_KEY = "luxscale_result_links";
const RESULT_LINK_TTL_MS = 60 * 60 * 1000; // 1 hour

// Helpers to read token
function getToken() {
  return new URLSearchParams(window.location.search).get("token");
}

function getStoredLinksRaw() {
  try {
    const raw = JSON.parse(localStorage.getItem(RESULT_LINKS_KEY) || "[]");
    return Array.isArray(raw) ? raw.filter((item) => typeof item === "string" && item.length > 0) : [];
  } catch (error) {
    return [];
  }
}

function getStoredAtFromLink(link) {
  try {
    const parsed = new URL(link, window.location.origin);
    const storedAtValue = Number(parsed.searchParams.get("stored_at"));
    return Number.isFinite(storedAtValue) ? storedAtValue : 0;
  } catch (error) {
    return 0;
  }
}

function getValidResultLinks() {
  const now = Date.now();
  const validLinks = getStoredLinksRaw()
    .filter((link) => now - getStoredAtFromLink(link) <= RESULT_LINK_TTL_MS)
    .sort((a, b) => getStoredAtFromLink(b) - getStoredAtFromLink(a));
  localStorage.setItem(RESULT_LINKS_KEY, JSON.stringify(validLinks));
  return validLinks;
}

function saveCurrentResultLink() {
  const token = getToken();
  if (!token) return;
  const linkUrl = new URL("result.html", window.location.href);
  linkUrl.searchParams.set("token", token);
  linkUrl.searchParams.set("stored_at", String(Date.now()));
  const currentLink = linkUrl.pathname + linkUrl.search;

  const existing = getValidResultLinks().filter((item) => item !== currentLink);
  existing.unshift(currentLink);
  localStorage.setItem(RESULT_LINKS_KEY, JSON.stringify(existing.slice(0, 20)));
}

// CSV generator (single implementation)
function generateCSV(data) {
  if (!data || !data.length) return "";
  const headers = [
    "Luminaire", "Power (W)", "Efficacy (lm/W)", "Fixtures",
    "Spacing X (m)", "Spacing Y (m)", "Average Lux", "Uniformity", "Total Power (W)"
  ];
  const keys = [
    "luminaire", "power", "efficacy", "fixtures",
    "spacing_x", "spacing_y", "avg_lux", "uniformity", "total_power"
  ];
  const csv = [headers.join(",")];
  data.forEach(row => {
    csv.push(keys.map(k => `"${row[k] ?? ""}"`).join(","));
  });
  return csv.join("\n");
}

function downloadCSV(csv) {
  const blob = new Blob([csv], { type: "text/csv" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  const resDate = new Date();
  link.download = `lighting_results_${resDate.toISOString().split('T')[0]}.csv`;
  link.click();
}

/* ========== image mapping logic ========== 
We try to auto-build the filenames:
Files are like: SC-Backlight-36W-transparent0001.png  OR  ECO-HighBay-100W-transparent0001.webp
This build function will:
 - map some API luminaire names to canonical base filenames (e.g. "SC downlight" -> "SC-Spot")
 - compose: <Base>-<Power>W-transparent000{1..4}.(png|webp)
If a file doesn't exist in the server folder, the browser will show the placeholder (so keep placeholder.png).
========================================== */

// quick manual mapping for names that differ from filenames
const NAME_TO_BASE = {
  // API value (lowercase trimmed) : base filename (exact capitalization in your file list)
  "sc downlight": "SC-Spot",
  "sc triproof": "SC-Triproof",
  "sc backlight": "SC-Backlight",
  "sc flood": "SC-Flood",
  "sc highbay": "SC-HighBay",
  "sc street": "SC-Street",
  "sc solar aio street": "SC-Solar-AIO-Street",
  "eco highbay": "ECO-HighBay",
  "eco street": "ECO-Street",
  "sv flood": "SV-Flood"
};

// Determine extension based on base name
function extForBase(base) {
  // your backlight/triproof/solar/spot are PNG in the list; others webp
  const pngKeywords = ["Backlight", "Triproof", "Solar-AIO-Street", "Spot"];
  for (const k of pngKeywords) if (base.includes(k)) return "png";
  return "webp";
}

// Build array of 4 image urls for a luminaire + power
function buildFixtureImages(luminaire, power) {
  if (!luminaire) return [PLACEHOLDER];
  const key = luminaire.toString().trim().toLowerCase();
  let base = NAME_TO_BASE[key];

  // fallback: try to convert name to a reasonable base (capitalize words and join with hyphen)
  if (!base) {
    // e.g. "SC downlight" -> "SC-Downlight"
    base = luminaire
      .trim()
      .split(/\s+/)
      .map(w => w.charAt(0).toUpperCase() + w.slice(1))
      .join("-");
  }

  // Some fixtures in API might not exactly match wattage sets (like 42W) — we'll use the given power.
  const watt = power ? `${power}W` : "";

  const ext = extForBase(base);
  const images = [];
  for (let i = 1; i <= 4; i++) {
    // compose filename like: SC-Backlight-36W-transparent0001.png
    const filename = watt ? `${base}-${watt}-transparent000${i}.${ext}` : `${base}-transparent000${i}.${ext}`;
    images.push(FIXTURES_BASE + filename);
  }
  return images;
}

/* ========== viewer setup ========== */
function setupViewer(viewerEl, imgEl, frames) {
  if (!viewerEl || !imgEl || !frames || !frames.length) return;
  let current = 0;
  let startX = 0;
  let isDown = false;

  // Preload frames (let browser cache)
  frames.forEach(src => {
    const im = new Image();
    im.src = src;
  });

  const setFrame = (idx) => {
    current = ((idx % frames.length) + frames.length) % frames.length;
    imgEl.src = frames[current];
  };

  // mouse
  viewerEl.addEventListener("mousedown", (e) => {
    isDown = true;
    startX = e.pageX;
    viewerEl.style.cursor = "grabbing";
  });
  window.addEventListener("mouseup", () => {
    isDown = false;
    viewerEl.style.cursor = "grab";
  });
  viewerEl.addEventListener("mouseleave", () => {
    isDown = false;
    viewerEl.style.cursor = "grab";
  });
  viewerEl.addEventListener("mousemove", (e) => {
    if (!isDown) return;
    const delta = e.pageX - startX;
    if (Math.abs(delta) >= 12) {
      const step = delta > 0 ? -1 : 1; // drag right -> previous frame visually better
      setFrame(current + step);
      startX = e.pageX;
    }
  });

  // touch (mobile)
  viewerEl.addEventListener("touchstart", (e) => {
    if (e.touches && e.touches[0]) startX = e.touches[0].pageX;
  }, { passive: true });

  viewerEl.addEventListener("touchmove", (e) => {
    if (!e.touches || !e.touches[0]) return;
    const x = e.touches[0].pageX;
    const delta = x - startX;
    if (Math.abs(delta) >= 12) {
      const step = delta > 0 ? -1 : 1;
      setFrame(current + step);
      startX = x;
    }
  }, { passive: true });

  // click/tap advance (optional)
  viewerEl.addEventListener("click", (e) => {
    // For small devices a short tap cycles forward one frame
    setFrame(current + 1);
  });

  // Ensure initial frame loaded (fallback to placeholder if missing)
  imgEl.onerror = () => { imgEl.src = PLACEHOLDER; };
  setFrame(0);
}

/* ========== display results & project info ========== */
function displayProjectSummary(requestObj, customerObj) {
  const container = document.getElementById("projectSummary");
  if (!requestObj && !customerObj) { container.innerHTML = ""; return; }
  const projectName = requestObj?.project_name || requestObj?.project || (requestObj?.place ? requestObj.place : "");
  const roomSize = requestObj?.sides ? `${requestObj.sides[0] ?? ""} x ${requestObj.sides[1] ?? ""} m` : "";
  const submitted = requestObj?.submitted_at || "";

  container.innerHTML = `
    <div class="summary-card card mb-3">
      <div class="card-body">
        <div class="row">
          <div class="col-md-6">
            <h5 class="card-title mb-1">${projectName || "Project"}</h5>
            <p class="mb-1"><strong>Client:</strong> ${customerObj?.name || requestObj?.name || ""}</p>
            <p class="mb-0"><strong>Company:</strong> ${customerObj?.company || requestObj?.company || ""}</p>
          </div>
          <div class="col-md-6 text-md-end">
            <p class="mb-1"><strong>Phone:</strong> ${customerObj?.phone || ""}</p>
            <p class="mb-0"><strong>Room:</strong> ${roomSize}</p>
            <p class="mb-0"><small class="text-muted">${submitted}</small></p>
          </div>
        </div>
      </div>
    </div>`;
}

function displayResults(resultArray) {
  const container = document.getElementById("resultsContainer");
  container.innerHTML = "";
  let counter = 1;
  resultArray.forEach((r, idx) => {
    // normalize keys from API: map API property names to our internal names
    const result = {
      luminaire: r["Luminaire"] || r.luminaire || "",
      power: r["Power (W)"] ?? r.power ?? "",
      efficacy: r["Efficacy (lm/W)"] ?? r.efficacy ?? "",
      fixtures: r["Fixtures"] ?? r.fixtures ?? "",
      spacing_x: r["Spacing X (m)"] ?? r.spacing_x ?? "",
      spacing_y: r["Spacing Y (m)"] ?? r.spacing_y ?? "",
      avg_lux: r["Average Lux"] ?? r.avg_lux ?? "",
      uniformity: r["Uniformity"] ?? r.uniformity ?? "",
      total_power: r["Total Power (W/H)"] ?? r.total_power ?? ""
    };

    const frames = buildFixtureImages(result.luminaire, result.power);

    const viewerId = `viewer-${idx}`;
    const imgId = `img-${idx}`;

    const col = document.createElement("div");
    col.className = "col-md-4 col-12";
    col.innerHTML = `
      <div class="card h-100">
        <div class="viewer" id="${viewerId}">
          <img id="${imgId}" src="${frames[0]}" alt="${escapeHtml(result.luminaire)}">
        </div>
        <div class="card-body d-flex flex-column">
          <h5 class="card-title">Option ${counter++}</h5>

          <ul class="list-group list-group-flush mb-3">
            <li class="list-group-item"><strong>Luminaire:</strong> ${escapeHtml(result.luminaire)}</li>
            <li class="list-group-item"><strong>Power (W):</strong> ${escapeHtml(result.power)}</li>
            <li class="list-group-item"><strong>Efficacy (lm/W):</strong> ${escapeHtml(result.efficacy)}</li>
            <li class="list-group-item"><strong>Fixtures:</strong> ${escapeHtml(result.fixtures)}</li>
            <li class="list-group-item"><strong>Spacing:</strong> ${escapeHtml(result.spacing_x)}m × ${escapeHtml(result.spacing_y)}m</li>
            <li class="list-group-item"><strong>Average Lux:</strong> ${escapeHtml(result.avg_lux)}</li>
            <li class="list-group-item"><strong>Uniformity:</strong> ${escapeHtml(result.uniformity)}</li>
            <li class="list-group-item"><strong>Total Power (W):</strong> ${escapeHtml(result.total_power)}</li>
          </ul>

          <div class="controls mt-auto">
            <button class="btn btn-outline-primary" onclick="goToLayout(${idx})">View Layout</button>
            <button class="btn btn-success" onclick="downloadCSV(generateCSV([results[${idx}]]))">CSV</button>
            <button class="btn btn-danger" onclick="generatePDF([results[${idx}]], request, customer)">PDF</button>
            <button class="btn btn-warning" onclick="displayPriceRequest(${idx}, this)">Request Price</button>
            <button class="btn btn-warning" onclick="handleDownloadDXF(${idx})">Download DXF</button>
            <button class="btn btn-warning" onclick="handleDownloadSTL(${idx})">Download STL</button>
          </div>
        </div>
      </div>
    `;
    container.appendChild(col);

    // Setup the interactive viewer for this card
    // Use a small timeout to ensure element is in DOM
    setTimeout(() => {
      const viewerEl = document.getElementById(viewerId);
      const imgEl = document.getElementById(imgId);
      setupViewer(viewerEl, imgEl, frames);
    }, 0);
  });
}

/* escape HTML for safety when inserting text */
function escapeHtml(str) {
  if (str === null || str === undefined) return "";
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

/* ========== layout/navigation helpers ========== */
function goToLayout(index) {
  const r = results[index];
  const data = {
    fixtures: r["Fixtures"] ?? r.fixtures,
    spacingX: r["Spacing X (m)"] ?? r.spacing_x,
    spacingY: r["Spacing Y (m)"] ?? r.spacing_y,
    roomLength: request.sides?.[0],
    roomWidth: request.sides?.[1]
  };
  localStorage.setItem('lightingModelData', JSON.stringify(data));
  window.location.href = 'maha/3d_model.html';
}

/* ========== PDF generator (kept from your page) ========== */
async function generatePDF(resultsArr, req, cust) {
  try {
    const { PDFDocument, rgb, StandardFonts } = PDFLib;
    const pdfDoc = await PDFDocument.create();
    const font = await pdfDoc.embedFont(StandardFonts.Helvetica);
    let bgImage = null;
    try {
      const bgImageBytes = await fetch("assets/pdfBG.png").then(r => r.arrayBuffer());
      bgImage = await pdfDoc.embedPng(bgImageBytes);
    } catch (e) { /* ignore missing bg */ }

    // First page - project/customer
    const firstPage = pdfDoc.addPage([595.28, 841.89]);
    if (bgImage) firstPage.drawImage(bgImage, { x: 0, y: 0, width: firstPage.getWidth(), height: firstPage.getHeight() });
    let y = firstPage.getHeight() - 95;
    const marginX = 70;
    const title = "Lighting Simulation Report";
    const fontSize = 20;
    const textWidth = font.widthOfTextAtSize(title, fontSize);
    const centerX = (firstPage.getWidth() - textWidth) / 2;
    firstPage.drawText(title, { x: centerX, y: y, size: fontSize, font: font, color: rgb(0.1, 0.1, 0.1) });
    y -= 40;

    const customerFields = [
      ["Customer Name", cust?.name],
      ["Email", cust?.email],
      ["Phone", cust?.phone],
      ["Company", cust?.company],
      ["Project Name", req?.project_name],
      ["Place", req?.place],
      ["Room Size (m)", req?.sides ? `${req.sides[0]} x ${req.sides[1]}` : ""],
      ["Height (m)", req?.height],
      ["Submitted At", req?.submitted_at]
    ];
    customerFields.forEach(([label, value]) => {
      firstPage.drawText(`${label}: ${value ?? ''}`, { x: marginX, y: y, size: 12, font: font, color: rgb(0, 0, 0) });
      y -= 18;
    });

    // Result pages (simple textual pages + layout image from canvas - omitted heavy visuals for brevity)
    for (let i = 0; i < resultsArr.length; i++) {
      const page = pdfDoc.addPage([595.28, 841.89]);
      if (bgImage) page.drawImage(bgImage, { x: 0, y: 0, width: page.getWidth(), height: page.getHeight() });
      let yPos = page.getHeight() - 95;
      page.drawText(`Option ${i+1}`, { x: marginX, y: yPos, size: 18, font: font, color: rgb(0.2,0.2,0.2) });
      yPos -= 26;
      const r = resultsArr[i];
      const fields = [
        ["Luminaire", r["Luminaire"] ?? r.luminaire],
        ["Power (W)", r["Power (W)"] ?? r.power],
        ["Efficacy (lm/W)", r["Efficacy (lm/W)"] ?? r.efficacy],
        ["Fixtures", r["Fixtures"] ?? r.fixtures],
        ["Spacing X (m)", r["Spacing X (m)"] ?? r.spacing_x],
        ["Spacing Y (m)", r["Spacing Y (m)"] ?? r.spacing_y],
        ["Average Lux", r["Average Lux"] ?? r.avg_lux],
        ["Uniformity", r["Uniformity"] ?? r.uniformity],
        ["Total Power (W)", r["Total Power (W)"] ?? r.total_power],
      ];
      fields.forEach(([label, value]) => {
        page.drawText(`${label}: ${value ?? ''}`, { x: marginX, y: yPos, size: 12, font: font, color: rgb(0,0,0) });
        yPos -= 18;
      });
    }

    // Save & trigger download
    const pdfBytes = await pdfDoc.save();
    const blob = new Blob([pdfBytes], { type: "application/pdf" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `lighting_results_${new Date().toISOString().split('T')[0]}.pdf`;
    link.click();
  } catch (err) {
    console.error("PDF generation error:", err);
    alert("Failed to generate PDF.");
  }
}

/* ========== price request helper (kept) ========== */
async function copyTextToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) {
    await navigator.clipboard.writeText(text);
    return;
  }

  const textarea = document.createElement("textarea");
  textarea.value = text;
  textarea.style.position = "fixed";
  textarea.style.left = "-9999px";
  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();
  document.execCommand("copy");
  textarea.remove();
}

/* ========== CAD export helpers ========== */
function normalizeResult(result) {
  return {
    luminaire: result["Luminaire"] ?? result.luminaire ?? "",
    power: Number(result["Power (W)"] ?? result.power ?? 0),
    fixtures: Math.max(1, Math.floor(Number(result["Fixtures"] ?? result.fixtures ?? 1))),
    spacingX: Math.max(0.01, Number(result["Spacing X (m)"] ?? result.spacing_x ?? 4) || 4),
    spacingY: Math.max(0.01, Number(result["Spacing Y (m)"] ?? result.spacing_y ?? 7) || 7)
  };
}

function buildModelData(result) {
  const normalized = normalizeResult(result);
  // Keep same mapping used in goToLayout() so exports match the 3D page.
  const roomLength = Math.max(1, Number(request?.sides?.[0] ?? 270) || 270);
  const roomWidth = Math.max(1, Number(request?.sides?.[1] ?? 15) || 15);

  return {
    fixtures: normalized.fixtures,
    spacingX: normalized.spacingX,
    spacingY: normalized.spacingY,
    roomLength,
    roomWidth
  };
}

function computeLayoutGrid(modelData) {
  const fixtures = modelData.fixtures;
  const spacingX = modelData.spacingX;
  const spacingY = modelData.spacingY;
  const roomLength = modelData.roomLength;
  const roomWidth = modelData.roomWidth;

  const maxCols = Math.floor(roomWidth / spacingX);
  const maxRows = Math.floor(roomLength / spacingY);

  let cols = maxCols > 0 ? maxCols : 1;
  let rows = maxRows > 0 ? maxRows : 1;

  // Exact same fixture grid logic as maha/3d_model.html
  if (cols * rows < fixtures) {
    rows = Math.ceil(fixtures / cols);
    if (maxRows > 0 && rows > maxRows) {
      rows = maxRows;
      cols = Math.ceil(fixtures / rows);
      if (maxCols > 0 && cols > maxCols) {
        cols = maxCols;
      }
    }
  }

  cols = Math.max(1, cols);
  rows = Math.max(1, rows);

  const gridWidth = (cols - 1) * spacingX;
  const gridLength = (rows - 1) * spacingY;
  const startX = -gridWidth / 2;
  const startZ = -gridLength / 2;
  const points = [];
  let placed = 0;

  for (let r = 0; r < rows && placed < fixtures; r++) {
    for (let c = 0; c < cols && placed < fixtures; c++) {
      const x = startX + c * spacingX;
      const z = startZ + r * spacingY;
      points.push({ x, z });
      placed++;
    }
  }

  return { cols, rows, gridWidth, gridLength, points };
}

function downloadTextFile(filename, content, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();
  URL.revokeObjectURL(link.href);
}

function dxfLine(x1, y1, x2, y2) {
  return `0
LINE
8
0
10
${x1}
20
${y1}
30
0
11
${x2}
21
${y2}
31
0
`;
}

function dxfCircle(x, y, radius) {
  return `0
CIRCLE
8
0
10
${x}
20
${y}
30
0
40
${radius}
`;
}

function buildDXFContent(modelData, layout) {
  const roomLength = modelData.roomLength;
  const roomWidth = modelData.roomWidth;
  const xMin = -roomWidth / 2;
  const xMax = roomWidth / 2;
  const zMin = -roomLength / 2;
  const zMax = roomLength / 2;

  let entities = "";
  // Room perimeter (same centered coordinates used by 3D model)
  entities += dxfLine(xMin, zMin, xMax, zMin);
  entities += dxfLine(xMax, zMin, xMax, zMax);
  entities += dxfLine(xMax, zMax, xMin, zMax);
  entities += dxfLine(xMin, zMax, xMin, zMin);

  // Distribution outline like the yellow rectangle in 3D view
  const outlinePad = 0.25;
  const oxMin = -layout.gridWidth / 2 - outlinePad;
  const oxMax = layout.gridWidth / 2 + outlinePad;
  const ozMin = -layout.gridLength / 2 - outlinePad;
  const ozMax = layout.gridLength / 2 + outlinePad;
  entities += dxfLine(oxMin, ozMin, oxMax, ozMin);
  entities += dxfLine(oxMax, ozMin, oxMax, ozMax);
  entities += dxfLine(oxMax, ozMax, oxMin, ozMax);
  entities += dxfLine(oxMin, ozMax, oxMin, ozMin);

  layout.points.forEach((p) => {
    entities += dxfCircle(p.x.toFixed(3), p.z.toFixed(3), 0.08);
  });

  return `0
SECTION
2
HEADER
0
ENDSEC
0
SECTION
2
ENTITIES
${entities}0
ENDSEC
0
EOF
`;
}

function stlFacet(ax, ay, az, bx, by, bz, cx, cy, cz) {
  return `  facet normal 0 0 0
    outer loop
      vertex ${ax} ${ay} ${az}
      vertex ${bx} ${by} ${bz}
      vertex ${cx} ${cy} ${cz}
    endloop
  endfacet
`;
}

function buildSTLContent(modelData, layout) {
  const roomLength = modelData.roomLength;
  const roomWidth = modelData.roomWidth;
  const wallHeight = Math.max(4, Math.min(30, Math.round(Math.max(6, roomWidth / 1.2))));
  const mountY = wallHeight - 0.5;
  const xMin = -roomWidth / 2;
  const xMax = roomWidth / 2;
  const zMin = -roomLength / 2;
  const zMax = roomLength / 2;
  const markerHeight = 0.25;
  const markerHalf = 0.08;

  const addQuad = (a, b, c, d) => stlFacet(...a, ...b, ...c) + stlFacet(...a, ...c, ...d);

  let body = "";

  // Floor + roof (centered like the 3D page)
  body += addQuad([xMin, 0, zMin], [xMax, 0, zMin], [xMax, 0, zMax], [xMin, 0, zMax]);
  body += addQuad([xMin, wallHeight, zMin], [xMax, wallHeight, zMin], [xMax, wallHeight, zMax], [xMin, wallHeight, zMax]);

  // Walls
  body += addQuad([xMin, 0, zMin], [xMax, 0, zMin], [xMax, wallHeight, zMin], [xMin, wallHeight, zMin]);
  body += addQuad([xMax, 0, zMin], [xMax, 0, zMax], [xMax, wallHeight, zMax], [xMax, wallHeight, zMin]);
  body += addQuad([xMax, 0, zMax], [xMin, 0, zMax], [xMin, wallHeight, zMax], [xMax, wallHeight, zMax]);
  body += addQuad([xMin, 0, zMax], [xMin, 0, zMin], [xMin, wallHeight, zMin], [xMin, wallHeight, zMax]);

  // Fixture markers positioned with same grid logic as 3D page
  layout.points.forEach((p) => {
    const x = p.x;
    const z = p.z;
    const topX = x;
    const topY = mountY + markerHeight;
    const topZ = z;
    const p1 = [x - markerHalf, mountY, z - markerHalf];
    const p2 = [x + markerHalf, mountY, z - markerHalf];
    const p3 = [x + markerHalf, mountY, z + markerHalf];
    const p4 = [x - markerHalf, mountY, z + markerHalf];

    body += stlFacet(...p1, ...p2, topX, topY, topZ);
    body += stlFacet(...p2, ...p3, topX, topY, topZ);
    body += stlFacet(...p3, ...p4, topX, topY, topZ);
    body += stlFacet(...p4, ...p1, topX, topY, topZ);
    body += stlFacet(...p1, ...p2, ...p3);
    body += stlFacet(...p1, ...p3, ...p4);
  });

  return `solid lighting_layout
${body}endsolid lighting_layout
`;
}

function handleDownloadDXF(index) {
  const selected = results[index];
  if (!selected) {
    alert("No result option selected.");
    return;
  }
  const modelData = buildModelData(selected);
  localStorage.setItem("lightingModelData", JSON.stringify(modelData));
  const layout = computeLayoutGrid(modelData);
  const dxf = buildDXFContent(modelData, layout);
  downloadTextFile(`lighting_layout_option_${index + 1}.dxf`, dxf, "application/dxf");
}

function handleDownloadSTL(index) {
  const selected = results[index];
  if (!selected) {
    alert("No result option selected.");
    return;
  }
  const modelData = buildModelData(selected);
  localStorage.setItem("lightingModelData", JSON.stringify(modelData));
  const layout = computeLayoutGrid(modelData);

  downloadTextFile(`lighting_layout_option_${index + 1}.stl`, stl, "model/stl");
}

/* ========== load results from API ========== */
async function fetchResultsPayload(token) {
  let lastError = "Failed to fetch results.";

  for (const endpoint of API_ENDPOINTS) {
    try {
      const response = await fetch(`${endpoint}?token=${encodeURIComponent(token)}`);
      const responseText = await response.text();
      let data = null;

      try {
        data = JSON.parse(responseText);
      } catch (parseError) {
        throw new Error(`Invalid JSON from ${endpoint}`);
      }

      if (!response.ok) {
        throw new Error(data?.message || `Request failed on ${endpoint}`);
      }

      return data;
    } catch (error) {
      lastError = error.message || lastError;
    }
  }

  throw new Error(lastError);
}

async function loadResults() {
  const token = getToken();
  if (!token) { alert("No token provided."); return; }

  try {
    const data = await fetchResultsPayload(token);
    // adapt to structure from your API
    results = data.results || data;
    request = data.request || { project_name: data.project_info?.["Project Name"], sides: [data.width, data.length], place: "" };
    customer = data.customer || {
      name: data.project_info?.["Client Name"],
      phone: data.project_info?.["Client Number"],
      company: data.project_info?.["Company Name"],
      email: ""
    };

    // adapt results into internal keys expected by UI if necessary:
    // convert API objects (with spaces) to simpler fields for CSV/PDF usage
    results = results.map(r => {
      return {
        "Luminaire": r["Luminaire"] ?? r.luminaire,
        "Power (W)": r["Power (W)"] ?? r.power,
        "Efficacy (lm/W)": r["Efficacy (lm/W)"] ?? r.efficacy,
        "Fixtures": r["Fixtures"] ?? r.fixtures,
        "Spacing X (m)": r["Spacing X (m)"] ?? r.spacing_x,
        "Spacing Y (m)": r["Spacing Y (m)"] ?? r.spacing_y,
        "Average Lux": r["Average Lux"] ?? r.avg_lux,
        "Uniformity": r["Uniformity"] ?? r.uniformity,
        "Total Power (W/H)": r["Total Power (W/H)"] ?? r.total_power
      };
    });

    displayProjectSummary(request, customer);
    displayResults(results);
  } catch (err) {
    console.error("Fetch error:", err);
    alert("Failed to load results from API.");
  }
}
