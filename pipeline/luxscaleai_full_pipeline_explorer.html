
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text-primary)}
.pipeline{padding:16px 0}
.stage{margin-bottom:8px;border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);overflow:hidden;background:var(--color-background-primary)}
.stage-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none;transition:background .15s}
.stage-header:hover{background:var(--color-background-secondary)}
.stage-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0}
.stage-meta{flex:1}
.stage-title{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.stage-sub{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.stage-arrow{font-size:12px;color:var(--color-text-tertiary);transition:transform .2s;flex-shrink:0}
.stage-arrow.open{transform:rotate(90deg)}
.stage-body{display:none;padding:0 16px 16px;border-top:0.5px solid var(--color-border-tertiary)}
.stage-body.open{display:block}
.section{margin-top:14px}
.section-label{font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.info-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}
.info-card-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:3px}
.info-card-val{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.code-line{background:var(--color-background-secondary);border-radius:6px;padding:8px 12px;font-family:var(--font-mono);font-size:12px;color:var(--color-text-primary);margin-bottom:6px;border-left:3px solid}
.step-list{list-style:none}
.step-list li{display:flex;gap:10px;padding:7px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px;align-items:flex-start}
.step-list li:last-child{border-bottom:none}
.step-n{min-width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;margin-top:1px}
.tag{display:inline-block;border-radius:20px;padding:2px 8px;font-size:11px;font-weight:500;margin:0 2px}
.connector{text-align:center;color:var(--color-text-tertiary);font-size:18px;padding:2px 0;margin:0}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.side-card{border-radius:var(--border-radius-md);padding:10px 12px;font-size:12px;line-height:1.6}
.formula{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px;font-family:var(--font-mono);font-size:12px;line-height:1.8;border:0.5px solid var(--color-border-tertiary)}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--color-text-secondary)}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
</style>

<div class="legend">
  <div class="legend-item"><div class="dot" style="background:#185FA5"></div>Frontend (HTML/JS)</div>
  <div class="legend-item"><div class="dot" style="background:#0F6E56"></div>Flask / Python backend</div>
  <div class="legend-item"><div class="dot" style="background:#854F0B"></div>Calculation engine</div>
  <div class="legend-item"><div class="dot" style="background:#534AB7"></div>AI layer</div>
  <div class="legend-item"><div class="dot" style="background:#888780"></div>Storage</div>
</div>

<div id="stages"></div>

const colors = {
  "Frontend (HTML/JS)": "#185FA5",
  "Flask backend": "#0F6E56",
  "Calculation engine": "#854F0B",
  "AI layer": "#534AB7",
  "Storage": "#888780"
};

function buildStage(s, i) {
  const div = document.createElement('div');
  div.className = 'stage';
  div.innerHTML = `
    <div class="stage-header" onclick="toggle(${i})">
      <div class="stage-num" style="background:${s.bg};color:${s.color}">${s.num}</div>
      <div class="stage-meta">
        <div class="stage-title">${s.title}</div>
        <div class="stage-sub">${s.sub}</div>
      </div>
      <span class="tag" style="background:${s.bg};color:${s.color}">${s.layer}</span>
      <div class="stage-arrow" id="arr${i}">▶</div>
    </div>
    <div class="stage-body" id="body${i}">
      <div class="section">
        <div class="section-label">What happens here</div>
        <div style="font-size:13px;line-height:1.6;color:var(--color-text-secondary)">${s.what}</div>
      </div>
      <div class="section">
        <div class="section-label">Key details</div>
        <div class="info-grid">
          ${s.details.map(d=>`<div class="info-card"><div class="info-card-label">${d.label}</div><div class="info-card-val" style="font-size:12px">${d.val}</div></div>`).join('')}
        </div>
      </div>
      <div class="section">
        <div class="section-label">Step by step</div>
        <ul class="step-list">
          ${s.steps.map((st,j)=>`<li><div class="step-n" style="background:${s.bg};color:${s.color}">${j+1}</div><div style="color:var(--color-text-primary)">${st}</div></li>`).join('')}
        </ul>
      </div>
      <div class="section">
        <div class="section-label">Key code</div>
        <div class="code-line" style="border-color:${s.codeColor}">${s.code.replace(/\n/g,'<br>')}</div>
      </div>
    </div>
  `;
  return div;
}

function toggle(i) {
  const body = document.getElementById('body'+i);
  const arr = document.getElementById('arr'+i);
  const open = body.classList.contains('open');
  body.classList.toggle('open', !open);
  arr.classList.toggle('open', !open);
}

const container = document.getElementById('stages');
stages.forEach((s,i) => {
  container.appendChild(buildStage(s,i));
  if(i < stages.length-1) {
    const c = document.createElement('div');
    c.className = 'connector';
    c.textContent = '↓';
    container.appendChild(c);
  }
});
</script>
