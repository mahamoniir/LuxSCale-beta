       <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">

<!-- ── MODAL SHELL ──────────────────────────────────────────────────────── -->
<div id="ies-modal-overlay" style="display:none" onclick="if(event.target===this)closeIESModal()">
  <div id="ies-modal">

    <!-- Header -->
    <div id="ies-modal-header">
      <div id="ies-modal-title">

            fill="#eb1b26"/>
        </svg>
        <span id="ies-modal-product-name">Luminaire</span>
        <span id="ies-modal-filename" style="font-weight:400;opacity:.5;font-size:11px"></span>
      </div>
      <button id="ies-modal-close" onclick="closeIESModal()">✕</button>
    </div>

    <!-- ── TAB BAR ──────────────────────────────────────────────────────── -->
    <div id="ies-tab-bar">
      <button class="ies-tab ies-tab-on" onclick="iesTab('specs')">📋 Specs</button>
      <button class="ies-tab" onclick="iesTab('polar')">📐 Polar Curve</button>
      <button class="ies-tab" onclick="iesTab('sim')">💡 Light Sim</button>
      <button class="ies-tab" onclick="iesTab('3d')">🌐 3-D View</button>
    </div>

    <!-- ── SPECS TAB ────────────────────────────────────────────────────── -->
    <div id="ies-panel-specs" class="ies-panel ies-panel-on">
      <div class="ies-specs-grid" id="ies-specs-grid">
        <!-- filled by JS -->
      </div>
      <div class="ies-tech-toggle" onclick="document.getElementById('ies-tech-rows').classList.toggle('open')">
        Technical data ▾
      </div>
      <div id="ies-tech-rows" class="ies-tech-rows">
        <!-- filled by JS -->
      </div>
    </div>

    <!-- ── POLAR TAB ────────────────────────────────────────────────────── -->
    <div id="ies-panel-polar" class="ies-panel">
      <div class="ies-pctrl">
        <label>H plane:</label>
        <select id="ies-ph-sel" onchange="iesRenderPolar()"></select>
        <label>Scale:</label>
        <select id="ies-scale" onchange="iesRenderPolar()">
          <option value="linear">Linear</option>
          <option value="sqrt">Sqrt</option>
          <option value="log">Log</option>
        </select>
        <label style="display:flex;align-items:center;gap:5px">
          <input type="checkbox" id="ies-show-beam" checked onchange="iesRenderPolar()" style="accent-color:#eb1b26">

      </div>

    <!-- ── LIGHT SIM TAB ────────────────────────────────────────────────── -->

      <div class="ies-sim-info" id="ies-sim-info">
        Preparing room simulation — using your project dimensions…
      </div>
      <!-- Controls -->
      <div class="ies-sim-ctrls">
        <div class="ies-scg">
          <label>Fixture height (m)</label>
          <input type="range" id="ies-sim-fh" min="1" max="15" step="0.1" value="3"

          <span id="ies-sim-fh-v">3.0 m</span>
        </div>
        <div class="ies-scg">
          <label>Room width (m)</label>
          <input type="range" id="ies-sim-rw" min="2" max="60" step="0.5" value="6"
                 oninput="iesSimSlider('rw')">
          <span id="ies-sim-rw-v">6.0 m</span>
        </div>
        <div class="ies-scg">
          <label>Room length (m)</label>
          <input type="range" id="ies-sim-rl" min="2" max="60" step="0.5" value="6"
                 oninput="iesSimSlider('rl')">
          <span id="ies-sim-rl-v">6.0 m</span>
        </div>
        <div class="ies-scg">
          <label>Ceiling height (m)</label>
          <input type="range" id="ies-sim-rh" min="2" max="12" step="0.1" value="3"
                 oninput="iesSimSlider('rh')">
          <span id="ies-sim-rh-v">3.0 m</span>
        </div>
        <div class="ies-scg">
          <label>Intensity %</label>
          <input type="range" id="ies-sim-int" min="5" max="200" value="100"
                 oninput="iesSimSlider('int')">
          <span id="ies-sim-int-v">100%</span>
        </div>
        <div class="ies-scg">
          <label>Color temp</label>
          <select id="ies-sim-ct" onchange="iesRenderPano()">
            <option value="warm">Warm White 3000K</option>
            <option value="neutral">Neutral 4000K</option>
            <option value="cool">Cool White 6500K</option>
          </select>
        </div>
        <div class="ies-scg">
          <label>Resolution</label>
          <select id="ies-sim-res" onchange="iesRenderPano()">
            <option value="512">Fast (512)</option>
            <option value="1024" selected>Normal (1024)</option>
            <option value="2048">High (2048)</option>
          </select>
        </div>
        <div class="ies-scg" style="justify-content:flex-end;padding-top:16px">
          <button class="ies-btn ies-btn-red" onclick="iesRenderPano()" style="width:100%">

      <div id="ies-pano-wrap">
        <div id="ies-pannellum"></div>
        <div id="ies-pano-loading">
          <div class="ies-ring" style="width:32px;height:32px;border-width:4px"></div>
          <p>Rendering light simulation from photometric data…</p>

        <div id="ies-pano-badge" style="display:none">360° IES SIM</div>

    <div id="ies-panel-3d" class="ies-panel">
      <div class="ies-pctrl">
        <label>Color:</label>
        <select id="ies-3d-color" onchange="iesRebuild3D()">
          <option value="thermal">Thermal</option>
          <option value="rainbow">Rainbow</option>

        </select>
        <label>Opacity:</label>

<script>
'use strict';
/* ─────────────────────────────────────────────────────────────────────────────
   IES Modal  ·  LuxScale integration
   ─────────────────────────────────────────────────────────────────────────── */

let _iesSid        = null;   // session id returned by /ies/upload
let _iesPlaceData  = {};     // { room_w, room_l, room_h } from LuxScale project
let _iesIESData    = null;   // raw ies_data JSON (for Three.js)
let _iesPanoViewer = null;   // pannellum instance
let _iesSimDebounce= null;

// ── 3-D state ────────────────────────────────────────────────────────────────
let _R3=null,_S3=null,_C3=null,_M3=null,_animId=null;
let _sph={theta:0.8,phi:0.55,r:1.5};


/* ─────────────────────────────────────────────────────────────────────────────
   PUBLIC API  — call from your result.html

   openIESModal(sid, placeData, productName)
     sid        : string  — returned by POST /ies/upload  { session_id }
     placeData  : object  — { room_w: number, room_l: number, room_h: number }
                            all in metres. Pull from your LuxScale place form.
     productName: string  — shown in the modal header  (optional)
   ─────────────────────────────────────────────────────────────────────────── */
window.openIESModal = function(sid, placeData, productName) {
  _iesSid       = sid;
  _iesPlaceData = placeData || {};
  _iesIESData   = null;

  // pre-fill room dimension sliders from place data
  _iesPreFillSliders(placeData);

  // header title
  if (productName) {
    document.getElementById('ies-modal-product-name').textContent = productName;
  }

  document.getElementById('ies-modal-overlay').style.display = 'flex';
  iesTab('specs');   // start on Specs tab
};

window.closeIESModal = function() {
  document.getElementById('ies-modal-overlay').style.display = 'none';
  _iesKillPano();
  _iesKill3D();
};

/* ─────────────────────────────────────────────────────────────────────────────
   Fill customer Specs panel from the /ies/upload response.
   Call this after your upload succeeds:

     const data = await res.json();
     iesPopulateSpecs(data.customer, data.filename);
   ─────────────────────────────────────────────────────────────────────────── */
window.iesPopulateSpecs = function(customer, filename) {
  // header filename chip
  const fnEl = document.getElementById('ies-modal-filename');
  if (fnEl) fnEl.textContent = filename || '';

  // populate H-plane selector for polar
  const ps = document.getElementById('ies-ph-sel');
  if (ps && customer.horizontal_angles) {
    ps.innerHTML = '';
    customer.horizontal_angles.forEach((h, i) => {
      const o = document.createElement('option');
      o.value = i; o.textContent = h + '°';
      ps.appendChild(o);
    });
  }

  // ── Customer-facing big tiles ─────────────────────────────────────────────
  const g = document.getElementById('ies-specs-grid');
  if (!g) return;

  const fmt = (v, dec=0) => v != null ? Number(v).toLocaleString(undefined, {maximumFractionDigits:dec}) : '—';

  const tiles = [
    { label:'Total Lumens',   value: fmt(customer.total_lumens),      unit:'lm',  cls:'green' },
    { label:'Beam Angle',     value: fmt(customer.beam_angle_deg,1),  unit:'°',   cls:'blue'  },
    { label:'Field Angle',    value: fmt(customer.field_angle_deg,1), unit:'°',   cls:''      },
    { label:'Peak Intensity', value: fmt(customer.peak_candela),      unit:'cd',  cls:'red'   },
  ];

  g.innerHTML = tiles.map(t => `
    <div class="ies-spec-tile ${t.cls}">
      <div class="ies-spec-label">${t.label}</div>
      <div class="ies-spec-value">${t.value}<span class="ies-spec-unit">${t.unit}</span></div>
    </div>`).join('');

  // ── Technical rows (collapsed by default) ────────────────────────────────
  const tech = document.getElementById('ies-tech-rows');
  if (!tech) return;
  const rows = [
    ['Declared Lumens',  fmt(customer.declared_lumens) + (customer.declared_lumens ? ' lm' : '')],
    ['LOR',              customer.lor_pct != null ? customer.lor_pct.toFixed(1)+'%' : '—'],
    ['Shape',            customer.shape   || '—'],
    ['Symmetry',         customer.symmetry|| '—'],
    ['Fixture W × L × H',
      [customer.fixture_width_m, customer.fixture_length_m, customer.fixture_height_m]
        .map(v => v != null ? v.toFixed(3)+'m' : '—').join(' × ')],
    ['H planes',         customer.num_horizontal != null ? customer.num_horizontal : '—'],
    ['V planes',         customer.num_vertical   != null ? customer.num_vertical   : '—'],
  ];
  tech.innerHTML = '<table>' +
    rows.map(([k,v]) =>
      `<tr><td>${k}</td><td>${v}</td></tr>`
    ).join('') + '</table>';
};


/* ─────────────────────────────────────────────────────────────────────────────
   Tab switching
   ─────────────────────────────────────────────────────────────────────────── */
window.iesTab = function(name) {
  document.querySelectorAll('.ies-tab').forEach((el, i) => {
    const names = ['specs','polar','sim','3d'];
    el.classList.toggle('ies-tab-on', names[i] === name);
  });
  document.querySelectorAll('.ies-panel').forEach(p => p.classList.remove('ies-panel-on'));
  document.getElementById('ies-panel-' + name).classList.add('ies-panel-on');

  if (name === 'polar') iesRenderPolar();
  if (name === 'sim')   _iesInitSim();
  if (name === '3d')    _iesInit3D();
};


/* ─────────────────────────────────────────────────────────────────────────────
   Polar
   ─────────────────────────────────────────────────────────────────────────── */
window.iesRenderPolar = async function() {
  if (!_iesSid) return;
  const h    = document.getElementById('ies-ph-sel').value;
  const sc   = document.getElementById('ies-scale').value;
  const beam = document.getElementById('ies-show-beam').checked;
  const url  = `/ies/plot/polar?sid=${_iesSid}&h_idx=${h}&scale=${sc}&show_beam=${beam}`;

  const sp  = document.getElementById('ies-sp-polar');
  const img = document.getElementById('ies-img-polar');
  if (sp)  sp.style.display  = 'flex';
  if (img) img.style.display = 'none';

  try {
    const d = await fetch(url).then(r => r.json());
    if (d.image) {
      img.src = 'data:image/png;base64,' + d.image;
      img.style.display = 'block';
      sp.style.display  = 'none';
    }
  } catch(e) {
    if (sp) sp.innerHTML = '<span style="color:#eb1b26">Error loading polar</span>';
  }
};


/* ─────────────────────────────────────────────────────────────────────────────
   Light Sim — 360° panorama
   ─────────────────────────────────────────────────────────────────────────── */
function _iesPreFillSliders(pd) {
  // pd = { room_w, room_l, room_h }  all in metres from LuxScale
  const setSlider = (id, val, min, max) => {
    const el = document.getElementById(id);
    if (!el || val == null) return;
    el.min   = Math.min(parseFloat(el.min), val);
    el.max   = Math.max(parseFloat(el.max), val);
    el.value = val;
  };

  if (pd.room_w != null) setSlider('ies-sim-rw', pd.room_w);
  if (pd.room_l != null) setSlider('ies-sim-rl', pd.room_l);
  if (pd.room_h != null) {
    setSlider('ies-sim-rh', pd.room_h);
    // default fixture height = 80% of ceiling
    setSlider('ies-sim-fh', Math.round(pd.room_h * 0.8 * 10) / 10);
  }

  // update display labels
  ['rw','rl','rh','fh'].forEach(k => {
    const el = document.getElementById(`ies-sim-${k}`);
    const lbl= document.getElementById(`ies-sim-${k}-v`);
    if (el && lbl) lbl.textContent = parseFloat(el.value).toFixed(1) + ' m';
  });
}

window.iesSimSlider = function(key) {
  const el  = document.getElementById(`ies-sim-${key}`);
  const lbl = document.getElementById(`ies-sim-${key}-v`);
  if (!el || !lbl) return;
  const v = parseFloat(el.value);
  lbl.textContent = key === 'int' ? Math.round(v) + '%' : v.toFixed(1) + ' m';
  clearTimeout(_iesSimDebounce);
  _iesSimDebounce = setTimeout(iesRenderPano, 700);
};

function _iesInitSim() {
  document.getElementById('ies-pano-loading').style.display = 'flex';
  document.getElementById('ies-pano-badge').style.display   = 'none';
  iesRenderPano();
}

window.iesRenderPano = async function() {
  if (!_iesSid) return;

  const fh  = parseFloat(document.getElementById('ies-sim-fh').value);
  const rw  = parseFloat(document.getElementById('ies-sim-rw').value);
  const rl  = parseFloat(document.getElementById('ies-sim-rl').value);
  const rh  = parseFloat(document.getElementById('ies-sim-rh').value);
  const int = parseFloat(document.getElementById('ies-sim-int').value) / 100;
  const ct  = document.getElementById('ies-sim-ct').value;
  const res = parseInt(document.getElementById('ies-sim-res').value);

  document.getElementById('ies-pano-loading').style.display = 'flex';
  document.getElementById('ies-pano-badge').style.display   = 'none';

  document.getElementById('ies-sim-info').innerHTML =
    `Room: <span>${rw.toFixed(1)} × ${rl.toFixed(1)} × ${rh.toFixed(1)} m</span>` +
    ` · Fixture: <span>${fh.toFixed(1)} m</span>` +
    ` · Intensity: <span>${Math.round(int*100)}%</span>` +
    ` · <span>Rendering…</span>`;

  try {
    const url = `/ies/panorama?sid=${_iesSid}` +
      `&room_w=${rw}&room_l=${rl}&room_h=${rh}` +
      `&fixture_h=${fh}&intensity=${int}&ct=${ct}` +
      `&w=${res}&h=${Math.round(res/2)}`;

    const d = await fetch(url).then(r => r.json());
    if (!d.image) { _iesPanoError('No image returned'); return; }

    const imgUrl = 'data:image/png;base64,' + d.image;

    _iesKillPano();
    document.getElementById('ies-pannellum').innerHTML = '';

    _iesPanoViewer = pannellum.viewer('ies-pannellum', {
      type: 'equirectangular',
      panorama: imgUrl,
      autoLoad: true,
      autoRotate: -1.5,
      compass: false,
      showControls: true,
      mouseZoom: true,
      hfov: 90, minHfov: 40, maxHfov: 130,
      showFullscreenCtrl: true,
      strings: { loadButtonLabel: 'View Room' },
    });

    document.getElementById('ies-pano-loading').style.display = 'none';
    document.getElementById('ies-pano-badge').style.display   = 'block';
    document.getElementById('ies-sim-info').innerHTML =
      `Room: <span>${rw.toFixed(1)} × ${rl.toFixed(1)} × ${rh.toFixed(1)} m</span>` +
      ` · Fixture: <span>${fh.toFixed(1)} m</span>` +
      ` · Drag to look around <span>↔ 360°</span>`;

  } catch(e) { _iesPanoError(e.message); }
};

function _iesPanoError(msg) {
  const el = document.getElementById('ies-pano-loading');
  if (el) el.innerHTML = `<span style="color:#eb1b26">Render failed: ${msg}</span>`;
}
function _iesKillPano() {
  if (_iesPanoViewer) { try { _iesPanoViewer.destroy(); } catch(e){} _iesPanoViewer = null; }
}


/* ─────────────────────────────────────────────────────────────────────────────
   3-D candela viewer  (Three.js)
   ─────────────────────────────────────────────────────────────────────────── */
async function _iesInit3D() {
  if (!_iesIESData) {
    document.getElementById('ies-3d-loading').style.display = 'flex';
    try {
      _iesIESData = await fetch(`/ies/ies_data?sid=${_iesSid}`).then(r => r.json());
    } catch(e) {
      document.getElementById('ies-3d-loading').innerHTML =
        '<span style="color:#eb1b26">Failed to load data</span>';
      return;
    }
  }
  _iesSetupRenderer();
  iesRebuild3D();
  document.getElementById('ies-3d-loading').style.display = 'none';
  if (!_animId) _iesAnimate();
}

function _iesSetupRenderer() {
  if (_R3) return;
  const canvas = document.getElementById('ies-three-canvas');
  const cont   = document.getElementById('ies-viewer-3d');
  _R3 = new THREE.WebGLRenderer({ canvas, antialias: true });
  _R3.setPixelRatio(Math.min(devicePixelRatio, 2));
  _R3.setClearColor(0x141414);
  _R3.setSize(cont.clientWidth, cont.clientHeight);
  _S3 = new THREE.Scene();
  _S3.add(new THREE.AmbientLight(0xffffff, 0.5));
  const dl = new THREE.DirectionalLight(0xffffff, 0.9);
  dl.position.set(1.5, 2, 1); _S3.add(dl);
  _C3 = new THREE.PerspectiveCamera(45, cont.clientWidth / cont.clientHeight, 0.005, 50);
  _iesUpdateCam();
  _S3.add(new THREE.AxesHelper(0.4));
  const grid = new THREE.GridHelper(2.4, 24, 0x2a2a2a, 0x222222);
  grid.position.y = -0.01; _S3.add(grid);
  _iesSetupOrbit(canvas);
  new ResizeObserver(() => {
    const c = document.getElementById('ies-viewer-3d');
    if (!c || !_R3) return;
    _R3.setSize(c.clientWidth, c.clientHeight);
    _C3.aspect = c.clientWidth / c.clientHeight;
    _C3.updateProjectionMatrix();
  }).observe(cont);
}

function _iesUpdateCam() {
  const x = _sph.r * Math.sin(_sph.phi) * Math.sin(_sph.theta);
  const y = _sph.r * Math.cos(_sph.phi);
  const z = _sph.r * Math.sin(_sph.phi) * Math.cos(_sph.theta);
  _C3.position.set(x, y, z); _C3.lookAt(0, 0.05, 0);
}

window.iesReset3DCam = function() { _sph={theta:0.8,phi:0.55,r:1.5}; _iesUpdateCam(); };

window.iesRebuild3D = function() {
  if (!_iesIESData || !_S3) return;
  if (_M3) { _S3.remove(_M3); _M3.geometry.dispose(); _M3.material.dispose(); _M3=null; }

  const d=_iesIESData, va=d.vertical_angles, ha=d.horizontal_angles,
        mat=d.candela_matrix, pk=d.max_value||1;
  const nH=ha.length, nV=va.length, sym=(d.symmetry||'').toLowerCase();
  let haFull=[], matFull=[];

  if (nH===1) {
    for(let i=0;i<72;i++){haFull.push(i*5);matFull.push(mat[0]);}
  } else if (sym.includes('quadrant') || ha[nH-1]<=90) {
    const q1=ha.map((h,i)=>({h,cd:mat[i]}));
    const q2=q1.slice().reverse().map(e=>({h:180-e.h,cd:e.cd}));
    const q3=q1.map(e=>({h:180+e.h,cd:e.cd}));
    const q4=q1.slice().reverse().map(e=>({h:360-e.h,cd:e.cd}));
    [...q1,...q2.slice(1),...q3.slice(1),...q4.slice(1,-1)].forEach(e=>{haFull.push(e.h);matFull.push(e.cd);});
  } else if (sym.includes('half') || ha[nH-1]<=180) {
    ha.forEach((h,i)=>{haFull.push(h);matFull.push(mat[i]);});
    ha.slice(1,-1).reverse().forEach((h,ri)=>{haFull.push(360-h);matFull.push(mat[nH-2-ri]);});
  } else {
    ha.forEach((h,i)=>{haFull.push(h);matFull.push(mat[i]);});
  }

  const nHF=haFull.length;
  const geo=new THREE.BufferGeometry(), pos=[], col=[], idx=[];
  const cMode=document.getElementById('ies-3d-color').value;

  function getColor(t) {
    if(cMode==='white') return [t,t,t];
    if(cMode==='rainbow'){const c=new THREE.Color().setHSL((1-t)*0.66,1,0.45);return[c.r,c.g,c.b];}
    if(t<0.2){const f=t/0.2;return[0,0,f];}
    if(t<0.4){const f=(t-0.2)/0.2;return[0,f,1];}
    if(t<0.6){const f=(t-0.4)/0.2;return[0,1,1-f];}
    if(t<0.8){const f=(t-0.6)/0.2;return[f,1,0];}
    const f=(t-0.8)/0.2;return[1,1-f*0.7,0];
  }

  for(let hi=0;hi<nHF;hi++){
    const phi=haFull[hi]*Math.PI/180, cdRow=matFull[hi];
    if(!cdRow||!cdRow.length) continue;
    for(let vi=0;vi<nV;vi++){
      const theta=va[vi]*Math.PI/180, r=Math.max(0,(cdRow[vi]||0))/pk;
      pos.push(r*Math.sin(theta)*Math.cos(phi), -r*Math.cos(theta), r*Math.sin(theta)*Math.sin(phi));
      const c=getColor(r); col.push(c[0],c[1],c[2]);
    }
  }
  for(let hi=0;hi<nHF;hi++){
    const hiN=(hi+1)%nHF;
    for(let vi=0;vi<nV-1;vi++){
      const a=hi*nV+vi, b=hi*nV+vi+1, c=hiN*nV+vi, dd=hiN*nV+vi+1;
      idx.push(a,b,c,b,dd,c);
    }
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
  geo.setAttribute('color',    new THREE.Float32BufferAttribute(col,3));
  geo.setIndex(idx); geo.computeVertexNormals();

  const op = parseInt(document.getElementById('ies-3d-op').value)/100;
  const mat3 = new THREE.MeshPhongMaterial({
    vertexColors:true, side:THREE.DoubleSide,
    wireframe: document.getElementById('ies-3d-wire').checked,
    opacity:op, transparent:op<1, shininess:40,
  });
  _M3 = new THREE.Mesh(geo, mat3); _S3.add(_M3);
};

window.iesUpdate3DOp = function(v) {
  document.getElementById('ies-3d-op-v').textContent = v+'%';
  if (_M3) { _M3.material.opacity=v/100; _M3.material.transparent=v<100; _M3.material.needsUpdate=true; }
};
window.iesUpdate3DWire = function() {
  if (_M3) { _M3.material.wireframe=document.getElementById('ies-3d-wire').checked; _M3.material.needsUpdate=true; }
};

function _iesAnimate() { _animId=requestAnimationFrame(_iesAnimate); if(_R3&&_S3&&_C3)_R3.render(_S3,_C3); }

function _iesKill3D() {
  cancelAnimationFrame(_animId); _animId=null;
  if(_M3){try{_S3&&_S3.remove(_M3);_M3.geometry.dispose();_M3.material.dispose();}catch(e){}_M3=null;}
  if(_R3){try{_R3.dispose();}catch(e){}_R3=null;_S3=null;_C3=null;}
}

function _iesSetupOrbit(canvas) {
  let drag=false,lastX=0,lastY=0,t0d=0;
  canvas.addEventListener('mousedown',e=>{drag=true;lastX=e.clientX;lastY=e.clientY;e.preventDefault();});
  canvas.addEventListener('contextmenu',e=>e.preventDefault());
  window.addEventListener('mouseup',()=>drag=false);
  window.addEventListener('mousemove',e=>{
    if(!drag)return;
    const dx=e.clientX-lastX,dy=e.clientY-lastY;lastX=e.clientX;lastY=e.clientY;
    _sph.theta-=dx*0.007;
    _sph.phi=Math.max(0.04,Math.min(Math.PI-0.04,_sph.phi+dy*0.007));
    _iesUpdateCam();
  });
  canvas.addEventListener('wheel',e=>{_sph.r=Math.max(0.25,Math.min(5,_sph.r+e.deltaY*0.0015));_iesUpdateCam();e.preventDefault();},{passive:false});
  canvas.addEventListener('touchstart',e=>{
    if(e.touches.length===1){drag=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;}
    if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;t0d=Math.hypot(dx,dy);}
    e.preventDefault();
  },{passive:false});
  canvas.addEventListener('touchmove',e=>{
    if(e.touches.length===1&&drag){
      const dx=e.touches[0].clientX-lastX,dy=e.touches[0].clientY-lastY;
      lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;
      _sph.theta-=dx*0.007;_sph.phi=Math.max(0.04,Math.min(Math.PI-0.04,_sph.phi+dy*0.007));
      _iesUpdateCam();
    }
    if(e.touches.length===2){
      const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
      const dist=Math.hypot(dx,dy);_sph.r=Math.max(0.25,Math.min(5,_sph.r-(dist-t0d)*0.004));t0d=dist;_iesUpdateCam();
    }
    e.preventDefault();
  },{passive:false});
  canvas.addEventListener('touchend',()=>drag=false);
}
</script>
